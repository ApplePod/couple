let _quoteTimer = null;

function stopMascotQuoteRefresh() {
  if (_quoteTimer) {
    clearTimeout(_quoteTimer);
    _quoteTimer = null;
  }
}

function popMascotQuote(quoteEl, text) {
  quoteEl.textContent = text;
  quoteEl.classList.remove('fm-quote-pop');
  void quoteEl.offsetWidth;
  quoteEl.classList.add('fm-quote-pop');
}

function scheduleMascotQuoteRefresh(quoteEl) {
  stopMascotQuoteRefresh();
  const delay = 5000 + Math.random() * 15000;
  _quoteTimer = setTimeout(() => {
    if (!document.body.contains(quoteEl)) return;
    popMascotQuote(quoteEl, refreshMascotMessage());
    rotatePandaCharacter();
    scheduleMascotQuoteRefresh(quoteEl);
  }, delay);
}

function sum(items) { return items.reduce((s, i) => s + i.amt, 0); }

function renderIsaBlock(person) {
  if (!person.isa) return '';
  const isa = person.isa;
  const total = isa.rows.reduce((s, r) => s + r.amt, 0);
  const totalLabel = isa.monthly ? '월 납입' : '7월 합계';
  return `<div class="isa-block${person.key === 'sn' ? ' sn-isa' : ''}">
    <div class="isa-block-title">🏦 ${isa.title} <span class="tag-once">${isa.tag}</span></div>
    ${isa.rows.map(r => `
      <div class="isa-row">
        <span class="isa-lbl">${r.label}</span>
        <span class="isa-val">${fmt(r.amt)}</span>
      </div>`).join('')}
    <div class="isa-total">
      <span>${totalLabel}</span>
      <span class="isa-val">${fmt(total)}</span>
    </div>
  </div>`;
}

function renderPersonCard(person) {
  const monthlyIsa = person.isa?.monthly ? sum(person.isa.rows) : 0;
  const expense = sum(person.items) + monthlyIsa;
  const balance = person.income - expense;
  const pct = Math.min(100, (expense / person.income) * 100);
  const cats = [...new Set(person.items.map(i => i.cat))];

  let body = '';
  for (const cat of cats) {
    body += `<div class="cat-block">
      <div class="cat-head"><span class="emoji">${CAT_EMOJI[cat] || '•'}</span>${cat}</div>`;
    for (const item of person.items.filter(i => i.cat === cat)) {
      const tags = [
        item.estimate ? '<span class="tag-est">예상</span>' : '',
        item.auto ? '<span class="tag-auto">자동이체</span>' : '',
      ].join('');
      body += `<div class="item-row">
        <div class="item-left">
          <div class="item-name">${item.name}${tags}</div>
          ${item.note ? `<div class="item-note">${item.note}</div>` : ''}
        </div>
        <div class="item-amt${item.estimate ? ' est' : ''}">${fmt(item.amt)}</div>
      </div>`;
    }
    body += `</div>`;
  }

  const isaBlock = renderIsaBlock(person);

  return `<div class="pcard ${person.key}">
    <div class="pcard-top">
      <div class="who">${person.name}</div>
      <div class="income-num">${fmt(person.income)}</div>
      <div class="income-sub">월 실수령액 (세후)</div>
      <div class="pcard-meter"><div class="fill" style="width:${pct.toFixed(1)}%"></div></div>
      <div class="pcard-meter-label">
        <span>지출·저축 ${pct.toFixed(0)}%</span>
        <span>남는 돈 ${fmtShort(Math.max(0, balance))}</span>
      </div>
    </div>
    ${body}
    ${isaBlock}
    <div class="pcard-footer">
      <div class="result-row sub">
        <span class="rl">월 지출·저축 합계</span>
        <span class="rv">${fmt(expense)}</span>
      </div>
      <div class="result-row bal${balance < 0 ? ' neg' : ''}">
        <span class="rl">남는 돈</span>
        <span class="rv">${balance < 0 ? '−' : ''}${fmt(Math.abs(balance))}</span>
      </div>
    </div>
  </div>`;
}

function normalizeLivingBudgetDetail(d) {
  const raw = d?.lines || [];
  const bySlot = new Map(raw.filter((l) => l.slotId).map((l) => [l.slotId, l]));
  const byCat = new Map(raw.map((l) => [l.category, l]));
  const consumed = new Set();
  const lines = LIVING_CATS.map((cat) => {
    const existing = bySlot.get(cat.id) || byCat.get(cat.name);
    if (existing) consumed.add(existing);
    return {
      slotId: cat.id,
      category: existing?.category ?? cat.name,
      date: existing?.date ?? '',
      amount: existing?.amount ?? '',
      note: existing?.note ?? cat.hint ?? '',
    };
  });
  for (const l of raw) {
    if (consumed.has(l) || l.slotId) continue;
    lines.push({
      category: l.category || '기타',
      date: l.date ?? '',
      amount: l.amount ?? '',
      note: l.note ?? '',
    });
  }
  return { type: 'living', lines };
}

/* ── 시온 연간 체크 ── */
function setSyncStatus(state, text) {
  const el = document.getElementById('sync-status');
  if (!el) return;
  el.className = 'sync-status' + (state ? ' ' + state : '');
  el.textContent = text;
}

function checksJson(checks) {
  return JSON.stringify(checks);
}

function hasUnsyncedCloudEdits() {
  return checksJson(budgetChecks) !== lastCloudJson;
}

function setSaveStatus(res) {
  if (res.ok && res.mode === 'supabase') setSyncStatus('supabase', 'Supabase 저장됨');
  else if (res.ok) setSyncStatus('', '브라우저에 저장됨');
  else setSyncStatus('error', '저장 실패 — 로컬만');
}

function isTrackerInputFocused() {
  const el = document.activeElement;
  return el && el.closest('#tracker-section') && /^(INPUT|TEXTAREA|SELECT)$/.test(el.tagName);
}

function syncFocusedInputs() {
  const el = document.activeElement;
  if (!el?.closest('#tracker-section')) return;
  if (el.matches('.ci-actual')) {
    const livingDetail = el.closest('.living-budget-details');
    if (livingDetail) {
      syncDetailToStore(livingDetail);
      return;
    }
    budgetChecks = setActual(
      budgetChecks, getPeriod().year, getPeriod().month,
      el.dataset.person, el.dataset.id, parseActualInput(el.value)
    );
    return;
  }
  if (el.matches('.me-actual')) {
    patchMonthlyLine(el.dataset.person, el.dataset.extraId, { actual: parseActualInput(el.value) });
    return;
  }
  if (el.matches('.se-actual')) {
    patchSavingsLine(el.dataset.person, el.dataset.savId, { actual: parseActualInput(el.value) });
    return;
  }
  const detailsEl = el.closest('.item-details');
  if (detailsEl) syncDetailToStore(detailsEl);
}

function flushPendingDetailSaves() {
  document.querySelectorAll('#tracker-section .item-details').forEach((el) => {
    if (!el._detailTimer) return;
    clearTimeout(el._detailTimer);
    el._detailTimer = null;
    syncDetailToStore(el);
  });
}

async function flushCloudSave() {
  if (!hasUnsyncedCloudEdits()) {
    if (storeMode === 'supabase') setSyncStatus('supabase', 'Supabase 저장됨');
    else setSyncStatus('', '브라우저에 저장됨');
    return;
  }
  cloudSaveInFlight = true;
  const snapshot = checksJson(budgetChecks);
  const res = await saveChecksToCloud(budgetChecks);
  cloudSaveInFlight = false;
  if (res.ok) {
    if (res.checks) {
      budgetChecks = res.checks;
      persistChecksLocal(budgetChecks);
      setLastSyncedChecks(res.checks);
    }
    if (checksJson(budgetChecks) === snapshot || res.checks) {
      lastCloudJson = checksJson(budgetChecks);
      clearDirty();
    } else {
      scheduleSave();
    }
  } else {
    markDirty();
  }
  setSaveStatus(res);
}

function scheduleSave() {
  persistChecksLocal(budgetChecks);
  markDirty();
  setSyncStatus('saving', '저장 중…');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => flushCloudSave(), 500);
}

async function flushSave() {
  syncFocusedInputs();
  flushPendingDetailSaves();
  persistChecksLocal(budgetChecks);
  clearTimeout(saveTimer);
  saveTimer = null;
  await flushCloudSave();
}

function applyRemoteChecks(remote, meta = {}) {
  const remoteJson = checksJson(remote);

  if (meta.source === 'initial') {
    budgetChecks = remote;
    lastCloudJson = remoteJson;
    persistChecksLocal(remote);
    setLastSyncedChecks(remote);
    return;
  }

  if (remoteJson === checksJson(budgetChecks)) {
    lastCloudJson = remoteJson;
    setLastSyncedChecks(remote);
    return;
  }
  if (remoteJson === lastCloudJson && !hasUnsyncedCloudEdits()) return;

  const base = JSON.parse(lastCloudJson || '{}');
  const merged = hasUnsyncedCloudEdits() || cloudSaveInFlight
    ? mergeChecks(base, budgetChecks, remote)
    : remote;

  if (checksJson(merged) === checksJson(budgetChecks)) {
    lastCloudJson = remoteJson;
    setLastSyncedChecks(remote);
    return;
  }

  budgetChecks = merged;
  persistChecksLocal(merged);
  lastCloudJson = remoteJson;

  if (isTrackerInputFocused()) {
    remoteChangedWhileEditing = true;
    updateWalletSummaries();
    setSyncStatus('supabase', '상대방 입력 반영됨');
    scheduleSave();
    return;
  }

  renderTracker();
  renderForecast();
  if (hasUnsyncedCloudEdits()) scheduleSave();
  else {
    setLastSyncedChecks(remote);
    if (storeMode === 'supabase') setSyncStatus('supabase', '동기화됨');
  }
}

function startRemotePolling() {
  if (pollTimer) clearInterval(pollTimer);
  if (storeMode !== 'supabase') return;
  pollTimer = setInterval(async () => {
    if (cloudSaveInFlight) return;
    const remote = await fetchRemoteChecks();
    if (remote) applyRemoteChecks(remote, { source: 'poll' });
  }, 3000);
}

  const lines = getSavingsExtraLines(person).map(l => l.id === savId ? { ...l, ...patch } : l);
  persistSavingsExtra(person, lines);
}

function calcSavingsStats(person) {
  const lines = getSavingsExtraLines(person);
  let planned = 0, actual = 0, checkedCount = 0;
  for (const ln of lines) {
    if (!ln.checked) continue;
    checkedCount++;
    const a = ln.actual !== '' && ln.actual != null ? Number(ln.actual) : 0;
    actual += a;
    planned += a;
  }
  return { planned, actual, checkedCount, total: lines.length };
}

function calcPersonWallet(person) {
  const income = person === 'yj' ? YJ.income : SN.income;
  const items = getMonthlyItems(person);
  const monthlyExtra = getMonthlyExtraLines(person);
  let plannedChecked = 0;
  let actualSpent = 0;
  let checkedCount = 0;
  for (const it of items) {
    if (!getCheck(budgetChecks, getPeriod().year, getPeriod().month, person, it.id)) continue;
    checkedCount++;
    const plan = itemPlanAmount(person, it);
    plannedChecked += plan;
    const actual = getActual(budgetChecks, getPeriod().year, getPeriod().month, person, it.id);
    actualSpent += actual !== null && actual !== '' ? actual : plan;
  }
  for (const ln of monthlyExtra) {
    if (!ln.checked) continue;
    checkedCount++;
    const plan = ln.plan !== '' && ln.plan != null ? Number(ln.plan) : 0;
    plannedChecked += plan;
    const a = ln.actual !== '' && ln.actual != null ? Number(ln.actual) : plan;
    actualSpent += a;
  }
  const spendPct = income > 0 ? Math.min(100, actualSpent / income * 100) : 0;
  const savings = calcSavingsStats(person);
  return {
    income, plannedChecked, actualSpent,
    remaining: income - actualSpent,
    checkedCount, total: items.length + monthlyExtra.length, spendPct, savings,
  };
}

function formatActualInput(val) {
  if (val === null || val === undefined || val === '') return '';

function parseActualInput(str) {
  const n = String(str).replace(/[^0-9]/g, '');

function updateWalletSummaries() {
  for (const person of ['yj', 'sn']) {
    const w = calcPersonWallet(person);
    const el = id => document.getElementById(id);
    if (!el(`w-planned-${person}`)) continue;
    el(`w-planned-${person}`).textContent = fmt(w.plannedChecked);
    el(`w-actual-${person}`).textContent = fmt(w.actualSpent);
    el(`w-remain-${person}`).textContent = (w.remaining < 0 ? '−' : '') + fmt(Math.abs(w.remaining));
    el(`w-remain-${person}`).closest('.wallet-row').className =
      `wallet-row remain ${w.remaining >= 0 ? 'positive' : 'negative'}`;
    el(`w-bar-${person}`).style.width = w.spendPct.toFixed(1) + '%';
    const savEl = el(`w-savings-${person}`);
    if (savEl) savEl.textContent = fmt(w.savings.actual);
    const savChk = el(`w-savings-chk-${person}`);
    if (savChk) savChk.textContent = `${w.savings.checkedCount}/${w.savings.total}`;
    const prog = document.querySelector(`.tracker-col.${person} .tracker-col-progress`);
    if (prog) {
      prog.textContent = `월급 ${w.checkedCount}/${w.total} · 목돈 ${w.savings.checkedCount}/${w.savings.total}`;
    }
  }
  const yj = calcPersonWallet('yj');
  const sn = calcPersonWallet('sn');
  const hIncome = yj.income + sn.income;
  const hActual = yj.actualSpent + sn.actualSpent;
  const hRemain = hIncome - hActual;
  const hw = document.getElementById('household-wallet');
  if (hw) {
    hw.querySelector('[data-hw=income]').textContent = fmt(hIncome);
    hw.querySelector('[data-hw=spent]').textContent = fmt(hActual);
    const remEl = hw.querySelector('[data-hw=remain]');
    remEl.textContent = (hRemain < 0 ? '−' : '') + fmt(Math.abs(hRemain));
    hw.querySelector('.hw-item.remain').classList.toggle('neg', hRemain < 0);
  }
  const yjV = getVisibleItems('yj');
  const snV = getVisibleItems('sn');
  const done =
    yjV.filter(it => getCheck(budgetChecks, getPeriod().year, getPeriod().month, 'yj', it.id)).length +
    snV.filter(it => getCheck(budgetChecks, getPeriod().year, getPeriod().month, 'sn', it.id)).length;
  const all = yjV.length + snV.length;
  const bar = document.getElementById('household-check-bar');
  if (bar) bar.style.width = (all ? done / all * 100 : 0) + '%';
  const cnt = document.getElementById('household-check-count');
  if (cnt) cnt.textContent = `${done}/${all}`;
  renderForecast();
}

function parseSharesInput(v) {

function calcInvestLineAmount(price, shares) {
  const p = Number(price) || 0;
  const s = parseSharesInput(shares);
  if (!p || !s) return '';
  return Math.round(p * s);
}

function syncInvestLineRow(row) {
  if (!row) return;
  const priceInp = row.querySelector('.dl-price');
  const sharesInp = row.querySelector('.dl-shares');
  const amountInp = row.querySelector('.dl-amount');
  if (!amountInp) return;
  const total = calcInvestLineAmount(parseActualInput(priceInp?.value || ''), sharesInp?.value || '');
  amountInp.value = total !== '' ? formatActualInput(total) : '';
}

function defaultDetail(it) {
  if (it.detailType === 'invest') {
    return { type: 'invest', lines: [{ symbol: '', price: '', shares: '', amount: '' }] };
  }
  if (it.livingBudget) return defaultLivingBudgetDetail();
  if (it.detailType === 'living') {
    const cat = it.livingFixedCat || LIVING_CATS[0]?.name || '기타';
    return { type: 'living', lines: [{ category: cat, amount: '' }] };
  }
  return null;
}

function ensureDetail(person, it) {
  let d = getDetail(budgetChecks, getPeriod().year, getPeriod().month, person, it.id);
  if (it.livingBudget) {
    if (!d || d.type !== 'living' || !Array.isArray(d.lines) || !d.lines.length) {
      return defaultLivingBudgetDetail();
    }
    return normalizeLivingBudgetDetail(d);
  }
  if (!d || !Array.isArray(d.lines) || !d.lines.length) d = defaultDetail(it);
  return d;
}

function itemPlanAmount(person, it) {
  if (it.livingBudget) return 0;
  return it.amt;
}

function sumDetailAmount(detail) {
  if (!detail?.lines) return 0;
  return detail.lines.reduce((s, ln) => s + (Number(String(ln.amount).replace(/,/g, '')) || 0), 0);
}

function escAttr(s) {
  return String(s ?? '').replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;');
}

function formatDetailAmt(v) {
  if (v === '' || v == null) return '';
  const n = Number(String(v).replace(/,/g, ''));
  return n ? n.toLocaleString('ko-KR') : '';
}

function renderInvestLines(lines) {
  return lines.map((ln, i) => {
    const priceVal = ln.price !== '' && ln.price != null && ln.price !== undefined
      ? formatActualInput(Number(ln.price)) : '';
    const computed = calcInvestLineAmount(ln.price, ln.shares);
    const amountVal = computed !== ''
      ? formatActualInput(computed)
      : formatDetailAmt(ln.amount);
    return `
    <tr class="detail-line" data-idx="${i}">
      <td class="symbol-ac-cell">${renderSymbolInput(ln.symbol)}</td>
      <td class="dl-price-cell"><input class="dl-price" placeholder="단가" inputmode="numeric" value="${priceVal}"></td>
      <td class="dl-shares-cell"><input class="dl-shares" placeholder="주" inputmode="decimal" value="${escAttr(ln.shares)}"></td>
      <td class="dl-amount-cell"><input class="dl-amount dl-amount-sum" placeholder="합계" inputmode="numeric" readonly tabindex="-1" value="${amountVal}"></td>
      <td style="width:32px"><button type="button" class="dl-remove" title="삭제">×</button></td>
    </tr>`;
  }).join('');
}

function renderLivingLines(lines, fixedCat) {
  const opts = livingCategoryOptions(fixedCat);
  return lines.map((ln, i) => {
    const cat = ln.category || opts[0];
    const catCell = fixedCat
      ? `<span style="color:var(--muted);font-size:.78rem">${escAttr(fixedCat)}</span><input type="hidden" class="dl-category" value="${escAttr(fixedCat)}">`
      : `<select class="dl-category">${opts.map(o => `<option value="${escAttr(o)}"${o === cat ? ' selected' : ''}>${escAttr(o)}</option>`).join('')}</select>`;
    return `<tr class="detail-line" data-idx="${i}">
      <td colspan="2">${catCell}</td>
      <td><input class="dl-amount" placeholder="금액" inputmode="numeric" value="${formatDetailAmt(ln.amount)}"></td>
      <td style="width:32px"><button type="button" class="dl-remove" title="삭제">×</button></td>
    </tr>`;
  }).join('');
}

function renderDetailPanel(person, it) {
  if (!it.detailType) return '';
  const detail = ensureDetail(person, it);
  const total = sumDetailAmount(detail);

  if (it.livingBudget) {
    return `<div class="item-details living-budget-details" data-person="${person}" data-id="${it.id}" data-type="living" hidden>
      <div class="detail-head">📋 생활비 상세</div>
      ${renderLivingBudgetTable(person, detail.lines)}
      <div class="detail-foot living-budget-foot">
        <button type="button" class="detail-add living-budget-add-btn tracker-edit-only" data-person="${person}" data-id="${it.id}">+ 항목 추가</button>
        <div class="detail-total"><span>상세 합계</span><span class="dt-val">${fmt(total)}</span></div>
      </div>
    </div>`;
  }

  const summaryLabel = it.detailType === 'invest' ? '📋 매수 상세 (종목·단가·주·합계)' : '📋 지출 상세 (분류별)';

  if (it.detailType === 'invest') {
    return `<div class="item-details" data-person="${person}" data-id="${it.id}" data-type="invest" hidden>
      <div class="detail-head">${summaryLabel}</div>
      <table class="detail-table invest-detail-table">
        <thead><tr><th>종목</th><th>단가</th><th>주</th><th>합계</th><th></th></tr></thead>
        <tbody class="detail-body">${renderInvestLines(detail.lines)}</tbody>
      </table>
      <div class="detail-foot">
        <button type="button" class="detail-add" data-person="${person}" data-id="${it.id}">+ 종목 추가</button>
        <div class="detail-total"><span>합계</span><span class="dt-val">${fmt(total)}</span></div>
      </div>
    </div>`;
  }

  return `<div class="item-details" data-person="${person}" data-id="${it.id}" data-type="living" hidden>
    <div class="detail-head">${summaryLabel}</div>
    <table class="detail-table">
      <thead><tr><th colspan="2">분류</th><th>금액</th><th></th></tr></thead>
      <tbody class="detail-body">${renderLivingLines(detail.lines, it.livingFixedCat)}</tbody>
    </table>
    <div class="detail-foot">
      <button type="button" class="detail-add" data-person="${person}" data-id="${it.id}"${it.livingFixedCat ? ' style="display:none"' : ''}>+ 항목 추가</button>
      <div class="detail-total"><span>합계</span><span class="dt-val">${fmt(total)}</span></div>
    </div>
  </div>`;
}

function getCheckItemDef(person, id) {
  const items = person === 'yj' ? YJ_CHECK_ITEMS : SN_CHECK_ITEMS;
  return items.find(x => x.id === id);
}

function readDetailFromWrap(detailsEl) {
  const type = detailsEl.dataset.type;
  const it = getCheckItemDef(detailsEl.dataset.person, detailsEl.dataset.id);
  if (it?.livingBudget) {
    const lines = [...detailsEl.querySelectorAll('.lb-row')].map((row) => ({
      slotId: row.dataset.slotId || undefined,
      category: row.querySelector('.lb-category-select')?.value || '',
      note: row.querySelector('.lb-note')?.value || '',
      date: row.querySelector('.lb-date-input')?.value || '',
      amount: parseActualInput(row.querySelector('.ci-actual')?.value || ''),
    }));
    return { type: 'living', lines };
  }
  const lines = [...detailsEl.querySelectorAll('.detail-line')].map(row => {
    if (type === 'invest') {
      const price = parseActualInput(row.querySelector('.dl-price')?.value || '');
      const shares = row.querySelector('.dl-shares')?.value || '';
      let amount = calcInvestLineAmount(price, shares);
      if (amount === '') amount = parseActualInput(row.querySelector('.dl-amount')?.value || '');
      return {
        symbol: row.querySelector('.dl-symbol')?.value || '',
        price: price === '' ? '' : price,
        shares,
        amount,
      };
    }
    return {
      category: row.querySelector('.dl-category')?.value || it?.livingFixedCat || '',
      amount: parseActualInput(row.querySelector('.dl-amount')?.value || ''),
    };
  });
  return { type, lines };
}

function syncDetailToStore(detailsEl) {
  const person = detailsEl.dataset.person;
  const id = detailsEl.dataset.id;
  const detail = readDetailFromWrap(detailsEl);
  budgetChecks = setDetail(budgetChecks, getPeriod().year, getPeriod().month, person, id, detail);
  const total = sumDetailAmount(detail);
  const dtVal = detailsEl.querySelector('.dt-val');
  if (dtVal) dtVal.textContent = fmt(total);
  updateWalletSummaries();
  scheduleSave();
}

function formatDepositDisplay(iso) {
  if (!iso) return '날짜';
  const parts = String(iso).split('-');
  if (parts.length !== 3) return '날짜';
  const [y, m, d] = parts;
  return `${y.slice(-2)}.${m}.${d}`;
}

function syncDatePill(input) {
  const wrap = input.closest('.ci-date-wrap');
  const pill = wrap?.querySelector('.ci-date-pill');
  const text = pill?.querySelector('.ci-date-text');
  if (!pill || !text) return;
  text.textContent = formatDepositDisplay(input.value);
  pill.classList.toggle('has-value', !!input.value);
}

function saveDepositDate(input) {
  const person = input.dataset.person;
  if (input.dataset.savId) {
    patchSavingsLine(person, input.dataset.savId, { deposit: input.value });
  } else if (input.dataset.extraId) {
    patchMonthlyLine(person, input.dataset.extraId, { deposit: input.value });
  } else {
    budgetChecks = setDeposit(budgetChecks, getPeriod().year, getPeriod().month, person, input.dataset.id, input.value);
  }
  syncDatePill(input);
  scheduleSave();
}

function openDatePicker(wrap) {
  const input = wrap?.querySelector('.ci-date-input');
  if (!input) return;
  if (typeof input.showPicker === 'function') {
    try {
      input.showPicker();
      return;
    } catch (_) { /* fall through */ }
  }
  const pill = wrap.querySelector('.ci-date-pill');
  const rect = pill?.getBoundingClientRect();
  const prev = input.style.cssText;
  input.style.cssText = [
    'position:fixed',
    `left:${rect?.left ?? 0}px`,
    `top:${rect?.top ?? 0}px`,
    `width:${rect?.width ?? 76}px`,
    `height:${rect?.height ?? 30}px`,
    'opacity:0.01',
    'pointer-events:auto',
    'z-index:9999',
    'border:0',
    'margin:0',
    'padding:0',
    'clip:auto',
    'overflow:visible',
  ].join(';');
  input.focus({ preventScroll: true });
  input.click();
  setTimeout(() => { input.style.cssText = prev; }, 400);
}

function renderDepositPill(deposit, attrs) {
  const has = !!deposit;
  return `<div class="ci-date-wrap">
    <button type="button" class="ci-date-pill${has ? ' has-value' : ''}" aria-label="입금일 선택">
      <span class="ci-date-text">${formatDepositDisplay(deposit)}</span>
    </button>
    <input type="date" class="ci-date-input" ${attrs} value="${escAttr(deposit || '')}" tabindex="-1" aria-hidden="true">
  </div>`;
}

function renderRowRemoveBtn(person, attrs, className, title) {
  return `<button type="button" class="ci-row-remove ${className}" data-person="${person}" ${attrs} title="${title}" aria-label="${title}">×</button>`;
}

function renderCheckRow(person, it) {
  const checked = getCheck(budgetChecks, getPeriod().year, getPeriod().month, person, it.id);
  const actual = getActual(budgetChecks, getPeriod().year, getPeriod().month, person, it.id);
  const deposit = getDeposit(budgetChecks, getPeriod().year, getPeriod().month, person, it.id);
  const detailPanel = renderDetailPanel(person, it);
  const hasDetail = !!it.detailType;
  const planAmt = itemPlanAmount(person, it);
  const actualField = `<input type="text" class="ci-actual" data-person="${person}" data-id="${it.id}"
        placeholder="실제 금액" inputmode="numeric"
        value="${formatActualInput(actual)}">`;
  return `<div class="check-item-wrap${hasDetail ? ' has-detail' : ''}${it.livingBudget ? ' living-budget-wrap' : ''}" data-person="${person}" data-id="${it.id}">
    <div class="check-item has-row-remove${checked ? ' done' : ''}${hasDetail ? ' expandable' : ''}" data-person="${person}" data-id="${it.id}">
      <input type="checkbox" class="ci-check" data-person="${person}" data-id="${it.id}" ${checked ? 'checked' : ''}>
      <div class="ci-name"><span class="ci-name-main">${it.name}${itemSubLabel(it)}</span></div>
      ${renderDepositPill(deposit, `data-person="${person}" data-id="${it.id}"`)}
      <div class="ci-plan"><span>계획</span>${fmtShort(planAmt)}</div>
      ${actualField}
      ${renderRowRemoveBtn(person, `data-id="${it.id}"`, 'ci-hide-btn', '이번 달에서 제외')}
    </div>
    ${detailPanel}
  </div>`;
}

function renderMonthlyExtraRow(person, ln) {
  const actual = ln.actual !== '' && ln.actual != null && ln.actual !== undefined
    ? formatActualInput(Number(ln.actual)) : '';
  const plan = ln.plan !== '' && ln.plan != null && ln.plan !== undefined
    ? formatActualInput(Number(ln.plan)) : '';
  const deposit = ln.deposit || '';
  return `<div class="check-item-wrap monthly-extra-wrap" data-person="${person}" data-extra-id="${ln.id}">
    <div class="check-item has-row-remove monthly-extra-item${ln.checked ? ' done' : ''}">
      <input type="checkbox" class="ci-check me-check" data-person="${person}" data-extra-id="${ln.id}" ${ln.checked ? 'checked' : ''}>
      <div class="ci-name">
        <input type="text" class="ci-name-field me-name" data-person="${person}" data-extra-id="${ln.id}" placeholder="항목명" value="${escAttr(ln.name)}">
      </div>
      ${renderDepositPill(deposit, `data-person="${person}" data-extra-id="${ln.id}"`)}
      <div class="ci-plan ci-plan-edit">
        <span>계획</span>
        <input type="text" class="me-plan" data-person="${person}" data-extra-id="${ln.id}" placeholder="—" inputmode="numeric" value="${plan}">
      </div>
      <input type="text" class="ci-actual me-actual" data-person="${person}" data-extra-id="${ln.id}"
        placeholder="실제 금액" inputmode="numeric" value="${actual}">
      ${renderRowRemoveBtn(person, `data-extra-id="${ln.id}"`, 'me-remove', '항목 삭제')}
    </div>
  </div>`;
}

function renderSavingsExtraRow(person, ln) {
  const actual = ln.actual !== '' && ln.actual != null && ln.actual !== undefined
    ? formatActualInput(Number(ln.actual)) : '';
  const deposit = ln.deposit || '';
  return `<div class="check-item-wrap savings-extra-wrap" data-person="${person}" data-sav-id="${ln.id}">
    <div class="check-item has-row-remove savings-extra-item${ln.checked ? ' done' : ''}">
      <input type="checkbox" class="ci-check se-check" data-person="${person}" data-sav-id="${ln.id}" ${ln.checked ? 'checked' : ''}>
      <div class="ci-name">
        <input type="text" class="ci-name-field se-name" data-person="${person}" data-sav-id="${ln.id}" placeholder="항목명 (예: ISA 목돈)" value="${escAttr(ln.name)}">
      </div>
      ${renderDepositPill(deposit, `data-person="${person}" data-sav-id="${ln.id}"`)}
      <div class="ci-plan"><span>계획</span>—</div>
      <input type="text" class="ci-actual se-actual" data-person="${person}" data-sav-id="${ln.id}"
        placeholder="실제 금액" inputmode="numeric" value="${actual}">
      ${renderRowRemoveBtn(person, `data-sav-id="${ln.id}"`, 'se-remove', '항목 삭제')}
    </div>
  </div>`;
}

function renderSavingsExtraSection(person) {
  const lines = getSavingsExtraLines(person);
  const rows = lines.map(ln => renderSavingsExtraRow(person, ln)).join('');
  return `<div class="check-section-label savings">💰 목돈에서 (월급 제외)</div>
    <div class="savings-extra-list check-list">${rows}</div>
    <button type="button" class="savings-add-btn tracker-edit-only" data-person="${person}">+ 목돈 항목 추가</button>`;
}

function renderCheckColumn(person, items, colorClass) {
  const monthly = getMonthlyItems(person);
  const monthlyExtra = getMonthlyExtraLines(person);
  const w = calcPersonWallet(person);

  const monthlyRows = monthly.map(it => renderCheckRow(person, it)).join('');
  const monthlyExtraRows = monthlyExtra.map(ln => renderMonthlyExtraRow(person, ln)).join('');
  const hidden = getHiddenItems(budgetChecks, getPeriod().year, getPeriod().month, person);
  const hiddenNote = hidden.length
    ? `<button type="button" class="hidden-restore-btn tracker-edit-only" data-person="${person}">숨긴 항목 ${hidden.length}개 되돌리기</button>` : '';
  const editing = trackerEditMode[person];

  const label = person === 'yj' ? '영재' : '시온';
  const prog = `월급 ${w.checkedCount}/${w.total} · 목돈 ${w.savings.checkedCount}/${w.savings.total}`;

  return `<div class="tracker-col ${colorClass}${editing ? ' edit-mode' : ''}" data-col="${person}">
    <div class="tracker-col-head">
      <h4>${label}</h4>
      <div class="tracker-col-head-right">
        <span class="tracker-col-progress">${prog}</span>
        <button type="button" class="tracker-edit-btn" data-person="${person}">${editing ? '완료' : '편집'}</button>
      </div>
    </div>
    ${renderSavingsWalletTop(person)}
    ${renderWalletBox(person)}
    <div class="check-section-label">📅 월급에서 (실수령 기준)</div>
    <div class="check-list monthly-check-list" data-person="${person}">${monthlyRows}${monthlyExtraRows}</div>
    <button type="button" class="monthly-add-btn tracker-edit-only" data-person="${person}">+ 월급 항목 추가</button>
    ${hiddenNote}
    ${renderSavingsExtraSection(person)}
  </div>`;
}

function attachTrackerEvents() {
  const section = document.getElementById('tracker-section');
  attachSymbolAutocomplete(section);

  section.onclick = e => {
    const datePill = e.target.closest('.ci-date-pill');
    if (datePill) {
      e.preventDefault();
      e.stopPropagation();
      openDatePicker(datePill.closest('.ci-date-wrap'));
      return;
    }

    const expandRow = e.target.closest('.check-item.expandable');
    if (expandRow && !e.target.closest('input, button, select, .item-details, .ci-date-wrap')) {
      const wrap = expandRow.closest('.check-item-wrap');
      const wasOpen = wrap.classList.contains('detail-open');
      section.querySelectorAll('.check-item-wrap.detail-open').forEach(w => {
        if (w === wrap) return;
        w.classList.remove('detail-open');
        w.querySelector('.item-details')?.setAttribute('hidden', '');
      });
      wrap.classList.toggle('detail-open', !wasOpen);
      const panel = wrap.querySelector('.item-details');
      if (panel) {
        if (!wasOpen) panel.removeAttribute('hidden');
        else panel.setAttribute('hidden', '');
      }
      return;
    }

    const editBtn = e.target.closest('.tracker-edit-btn');
    if (editBtn) {
      e.preventDefault();
      const person = editBtn.dataset.person;
      trackerEditMode[person] = !trackerEditMode[person];
      const col = document.querySelector(`.tracker-col[data-col="${person}"]`);
      if (col) col.classList.toggle('edit-mode', trackerEditMode[person]);
      editBtn.textContent = trackerEditMode[person] ? '완료' : '편집';
      return;
    }

    const addMonthlyBtn = e.target.closest('.monthly-add-btn');
    if (addMonthlyBtn) {
      e.preventDefault();
      const person = addMonthlyBtn.dataset.person;
      const lines = [...getMonthlyExtraLines(person)];
      const line = { id: 'mex_' + Date.now(), name: '', plan: '', checked: false, actual: '', deposit: '' };
      lines.push(line);
      budgetChecks = setMonthlyExtra(budgetChecks, getPeriod().year, getPeriod().month, person, lines);
      addMonthlyBtn.previousElementSibling.insertAdjacentHTML('beforeend', renderMonthlyExtraRow(person, line));
      updateWalletSummaries();
      scheduleSave();
      return;
    }

    const addSavBtn = e.target.closest('.savings-add-btn');
    if (addSavBtn) {
      e.preventDefault();
      const person = addSavBtn.dataset.person;
      const lines = [...getSavingsExtraLines(person)];
      const line = { id: 'sav_' + Date.now(), name: '', checked: false, actual: '', deposit: '' };
      lines.push(line);
      budgetChecks = setSavingsExtra(budgetChecks, getPeriod().year, getPeriod().month, person, lines);
      addSavBtn.previousElementSibling.insertAdjacentHTML('beforeend', renderSavingsExtraRow(person, line));
      updateWalletSummaries();
      scheduleSave();
      return;
    }

    const hideBtn = e.target.closest('.ci-hide-btn');
    if (hideBtn) {
      e.preventDefault();
      const person = hideBtn.dataset.person;
      const id = hideBtn.dataset.id;
      const hidden = [...getHiddenItems(budgetChecks, getPeriod().year, getPeriod().month, person)];
      if (!hidden.includes(id)) hidden.push(id);
      budgetChecks = setHiddenItems(budgetChecks, getPeriod().year, getPeriod().month, person, hidden);
      renderTracker();
      scheduleSave();
      return;
    }

    const restoreBtn = e.target.closest('.hidden-restore-btn');
    if (restoreBtn) {
      e.preventDefault();
      const person = restoreBtn.dataset.person;
      budgetChecks = setHiddenItems(budgetChecks, getPeriod().year, getPeriod().month, person, []);
      renderTracker();
      scheduleSave();
      return;
    }

    const rmMonthlyBtn = e.target.closest('.me-remove');
    if (rmMonthlyBtn) {
      e.preventDefault();
      const person = rmMonthlyBtn.dataset.person;
      const extraId = rmMonthlyBtn.dataset.extraId;
      const lines = getMonthlyExtraLines(person).filter(l => l.id !== extraId);
      persistMonthlyExtra(person, lines);
      rmMonthlyBtn.closest('.monthly-extra-wrap')?.remove();
      return;
    }

    const rmSavBtn = e.target.closest('.se-remove');
    if (rmSavBtn) {
      e.preventDefault();
      const person = rmSavBtn.dataset.person;
      const savId = rmSavBtn.dataset.savId;
      const lines = getSavingsExtraLines(person).filter(l => l.id !== savId);
      persistSavingsExtra(person, lines);
      rmSavBtn.closest('.savings-extra-wrap')?.remove();
      return;
    }

    const addBtn = e.target.closest('.detail-add');
    if (addBtn) {
      e.preventDefault();
      const person = addBtn.dataset.person;
      const id = addBtn.dataset.id;
      const it = getCheckItemDef(person, id);
      const detailsEl = addBtn.closest('.item-details');
      const detail = readDetailFromWrap(detailsEl);
      if (it.livingBudget) {
        const newLine = {
          category: '기타',
          date: '',
          amount: '',
          note: '',
        };
        detail.lines.push(newLine);
        budgetChecks = setDetail(budgetChecks, getPeriod().year, getPeriod().month, person, id, detail);
        const body = detailsEl.querySelector('.living-budget-body');
        body.insertAdjacentHTML('beforeend', renderLivingBudgetLine(person, newLine, detail.lines.length - 1));
        syncDetailToStore(detailsEl);
        const noteInp = body.querySelector('.lb-row:last-child .lb-note');
        noteInp?.focus();
        return;
      }
      if (it.detailType === 'invest') {
        detail.lines.push({ symbol: '', price: '', shares: '', amount: '' });
        detailsEl.querySelector('.detail-body').insertAdjacentHTML('beforeend', renderInvestLines([detail.lines.at(-1)]));
      } else {
        detail.lines.push({ category: it.livingFixedCat || LIVING_CATS[0].name, amount: '' });
        detailsEl.querySelector('.detail-body').insertAdjacentHTML('beforeend', renderLivingLines([detail.lines.at(-1)], it.livingFixedCat));
      }
      budgetChecks = setDetail(budgetChecks, getPeriod().year, getPeriod().month, person, id, detail);
      scheduleSave();
      return;
    }
    const rmLbBtn = e.target.closest('.lb-custom-remove');
    if (rmLbBtn) {
      e.preventDefault();
      const detailsEl = rmLbBtn.closest('.item-details');
      const line = rmLbBtn.closest('.lb-row');
      if (line?.dataset.slotId) return;
      line?.remove();
      syncDetailToStore(detailsEl);
      return;
    }
    const rmDetailBtn = e.target.closest('.dl-remove');
    if (rmDetailBtn) {
      e.preventDefault();
      const detailsEl = rmDetailBtn.closest('.item-details');
      const body = detailsEl.querySelector('.detail-body');
      if (body.querySelectorAll('.detail-line').length <= 1) return;
      rmDetailBtn.closest('.detail-line').remove();
      syncDetailToStore(detailsEl);
    }
  };

  section.onchange = e => {
    const dateInp = e.target.closest('.ci-date-input');
    if (dateInp) {
      const lbDetails = dateInp.closest('.living-budget-details');
      if (lbDetails) {
        syncDatePill(dateInp);
        syncDetailToStore(lbDetails);
      } else {
        saveDepositDate(dateInp);
      }
      return;
    }
    const meCheck = e.target.closest('.me-check');
    if (meCheck) {
      patchMonthlyLine(meCheck.dataset.person, meCheck.dataset.extraId, { checked: meCheck.checked });
      meCheck.closest('.check-item').classList.toggle('done', meCheck.checked);
      updateWalletSummaries();
      return;
    }
    const seCheck = e.target.closest('.se-check');
    if (seCheck) {
      patchSavingsLine(seCheck.dataset.person, seCheck.dataset.savId, { checked: seCheck.checked });
      seCheck.closest('.check-item').classList.toggle('done', seCheck.checked);
      return;
    }
    const cb = e.target.closest('.ci-check');
    if (cb) {
      budgetChecks = setCheck(budgetChecks, getPeriod().year, getPeriod().month, cb.dataset.person, cb.dataset.id, cb.checked);
      cb.closest('.check-item').classList.toggle('done', cb.checked);
      updateWalletSummaries();
      scheduleSave();
      return;
    }
    const lbCatSel = e.target.closest('.lb-category-select');
    if (lbCatSel) {
      const row = lbCatSel.closest('.lb-row');
      const iconEl = row?.querySelector('.lb-cat-icon');
      if (iconEl) iconEl.textContent = livingBudgetCatIcon(lbCatSel.value);
      syncDetailToStore(lbCatSel.closest('.item-details'));
      return;
    }
    const detailsEl = e.target.closest('.item-details');
    if (detailsEl) syncDetailToStore(detailsEl);
  };

  section.oninput = e => {
    const dateInp = e.target.closest('.ci-date-input');
    if (dateInp) {
      const lbDetails = dateInp.closest('.living-budget-details');
      if (lbDetails) {
        syncDatePill(dateInp);
        syncDetailToStore(lbDetails);
      } else {
        saveDepositDate(dateInp);
      }
      return;
    }
    const meName = e.target.closest('.me-name');
    if (meName) {
      patchMonthlyLine(meName.dataset.person, meName.dataset.extraId, { name: meName.value });
      return;
    }
    const mePlan = e.target.closest('.me-plan');
    if (mePlan && !mePlan.closest('.living-budget-details')) {
      patchMonthlyLine(mePlan.dataset.person, mePlan.dataset.extraId, { plan: parseActualInput(mePlan.value) });
      updateWalletSummaries();
      return;
    }
    const meActual = e.target.closest('.me-actual');
    if (meActual) {
      patchMonthlyLine(meActual.dataset.person, meActual.dataset.extraId, { actual: parseActualInput(meActual.value) });
      updateWalletSummaries();
      return;
    }
    const seName = e.target.closest('.se-name');
    if (seName) {
      patchSavingsLine(seName.dataset.person, seName.dataset.savId, { name: seName.value });
      return;
    }
    const seActual = e.target.closest('.se-actual');
    if (seActual) {
      const val = parseActualInput(seActual.value);
      patchSavingsLine(seActual.dataset.person, seActual.dataset.savId, { actual: val });
      return;
    }
    const inp = e.target.closest('.ci-actual');
    if (inp) {
      const livingDetail = inp.closest('.living-budget-details');
      if (livingDetail) {
        clearTimeout(livingDetail._detailTimer);
        livingDetail._detailTimer = setTimeout(() => syncDetailToStore(livingDetail), 400);
        return;
      }
      const val = parseActualInput(inp.value);
      budgetChecks = setActual(budgetChecks, getPeriod().year, getPeriod().month, inp.dataset.person, inp.dataset.id, val);
      updateWalletSummaries();
      scheduleSave();
      return;
    }
    const investField = e.target.closest('.dl-price, .dl-shares');
    if (investField) {
      const detailsEl = investField.closest('.item-details[data-type="invest"]');
      if (detailsEl) {
        syncInvestLineRow(investField.closest('.detail-line'));
        clearTimeout(detailsEl._detailTimer);
        detailsEl._detailTimer = setTimeout(() => syncDetailToStore(detailsEl), 400);
        return;
      }
    }
    const detailsEl = e.target.closest('.item-details');
    if (detailsEl) {
      clearTimeout(detailsEl._detailTimer);
      detailsEl._detailTimer = setTimeout(() => syncDetailToStore(detailsEl), 400);
    }
  };

  section.addEventListener('blur', e => {
    const mePlan = e.target.closest('.me-plan');
    if (mePlan && !mePlan.closest('.living-budget-details')) {
      const lines = getMonthlyExtraLines(mePlan.dataset.person);
      const ln = lines.find(l => l.id === mePlan.dataset.extraId);
      const n = ln?.plan !== '' && ln?.plan != null ? Number(ln.plan) : '';
      mePlan.value = n ? formatActualInput(n) : '';
      return;
    }
    const meActual = e.target.closest('.me-actual');
    if (meActual) {
      const lines = getMonthlyExtraLines(meActual.dataset.person);
      const ln = lines.find(l => l.id === meActual.dataset.extraId);
      const n = ln?.actual !== '' && ln?.actual != null ? Number(ln.actual) : '';
      meActual.value = n ? formatActualInput(n) : '';
      flushSave();
      return;
    }
    const seActual = e.target.closest('.se-actual');
    if (seActual) {
      const lines = getSavingsExtraLines(seActual.dataset.person);
      const ln = lines.find(l => l.id === seActual.dataset.savId);
      const n = ln?.actual !== '' && ln?.actual != null ? Number(ln.actual) : '';
      seActual.value = n ? formatActualInput(n) : '';
      flushSave();
      return;
    }
    const inp = e.target.closest('.ci-actual');
    if (inp) {
      if (inp.closest('.living-budget-details')) {
        const n = parseActualInput(inp.value);
        inp.value = n ? formatActualInput(n) : '';
        syncDetailToStore(inp.closest('.item-details'));
        flushSave();
        return;
      }
      const actual = getActual(budgetChecks, getPeriod().year, getPeriod().month, inp.dataset.person, inp.dataset.id);
      inp.value = formatActualInput(actual);
      flushSave();
      return;
    }
    const amt = e.target.closest('.dl-amount');
    if (amt) {
      if (amt.classList.contains('dl-amount-sum')) return;
      const n = parseActualInput(amt.value);
      amt.value = n ? formatActualInput(n) : '';
      const detailsEl = amt.closest('.item-details');
      if (detailsEl) syncDetailToStore(detailsEl);
      return;
    }
    const priceInp = e.target.closest('.dl-price');
    if (priceInp) {
      const n = parseActualInput(priceInp.value);
      priceInp.value = n ? formatActualInput(n) : '';
      const row = priceInp.closest('.detail-line');
      syncInvestLineRow(row);
      const detailsEl = priceInp.closest('.item-details');
      if (detailsEl) syncDetailToStore(detailsEl);
      flushSave();
      return;
    }
    if (e.target.closest('#tracker-section') && remoteChangedWhileEditing) {
      remoteChangedWhileEditing = false;
      renderTracker();
    }
  }, true);
}

function renderTracker() {
  const yjItems = YJ_CHECK_ITEMS;
  const snItems = SN_CHECK_ITEMS;
  const yj = calcPersonWallet('yj');
  const sn = calcPersonWallet('sn');
  const hIncome = yj.income + sn.income;
  const hActual = yj.actualSpent + sn.actualSpent;
  const hRemain = hIncome - hActual;

  const yearBtns = TRACKER_YEARS.map(y =>
    `<button class="year-tab${y === getPeriod().year ? ' active' : ''}" data-year="${y}">${y}년</button>`
  ).join('');

  const monthBtns = MONTH_LABELS.map((lbl, i) => {
    const m = String(i + 1);
    return `<button class="month-tab${m === getPeriod().month ? ' active' : ''}" data-month="${m}">${lbl}</button>`;
  }).join('');

  const totalDone = yj.checkedCount + sn.checkedCount;
  const totalAll = yj.total + sn.total;
  const pct = totalAll ? (totalDone / totalAll * 100) : 0;

  const sbHint = storeMode === 'local'
    ? `<div class="config-hint">⚠️ Supabase 미연결 — 브라우저에만 저장됩니다.</div>`
    : '';

  document.getElementById('tracker-section').innerHTML = `
    <div class="tracker-header">
      <h3>✅ 월별 체크리스트</h3>
      <span class="sync-status" id="sync-status">${storeMode === 'supabase' ? 'Supabase 연결됨' : '로컬 저장'}</span>
    </div>
    <div class="year-tabs" id="year-tabs">${yearBtns}</div>
    <div class="month-tabs" id="month-tabs">${monthBtns}</div>
    <div class="household-wallet" id="household-wallet">
      <div class="hw-item"><div class="hl">가구 실수령</div><div class="hv" data-hw="income">${fmt(hIncome)}</div></div>
      <div class="hw-item"><div class="hl">실제 지출 합계</div><div class="hv" data-hw="spent">${fmt(hActual)}</div></div>
      <div class="hw-item remain${hRemain < 0 ? ' neg' : ''}"><div class="hl">가구 남는 돈</div><div class="hv" data-hw="remain">${hRemain < 0 ? '−' : ''}${fmt(Math.abs(hRemain))}</div></div>
    </div>
    <div class="tracker-progress">
      <span>${getPeriod().year}년 ${getPeriod().month}월 · 체크 진행</span>
      <div class="bar"><div class="bar-fill" id="household-check-bar" style="width:${pct}%"></div></div>
      <strong id="household-check-count">${totalDone}/${totalAll}</strong>
    </div>
    <div class="tracker-dual">
      ${renderCheckColumn('yj', yjItems, 'yj')}
      ${renderCheckColumn('sn', snItems, 'sn')}
    </div>
    ${sbHint}`;

  document.getElementById('year-tabs').onclick = async e => {
    const btn = e.target.closest('[data-year]');
    if (!btn) return;
    await flushSave();
    setPeriod(+btn.dataset.year, getPeriod().month);
    forecastYear = getPeriod().year;
    renderTracker();
    attachTrackerEvents();
  };

  document.getElementById('month-tabs').onclick = async e => {
    const btn = e.target.closest('[data-month]');
    if (!btn) return;
    await flushSave();
    setPeriod(getPeriod().year, btn.dataset.month);
    renderTracker();
    attachTrackerEvents();
  };

  attachTrackerEvents();
}

function renderWilliam() {
  document.getElementById('william-section').innerHTML = `
    <div class="william-icon">📦</div>
    <div class="william-title">윌리엄 (영재)</div>
    <div class="william-desc">780만원 · 무이자 · 12개월 할부<br>7월부터 매월 납부</div>
    <div class="william-amt">월 ${fmt(650000)}</div>`;
}

function renderForecastMascot(pct, actual, planned) {
  const quote = pickMascotMessage();
  const st = achievementStatus(pct);
  return `<div class="forecast-mascot-slot">
    <div class="forecast-hero-card highlight">
      <div class="fh-label">전체 누적 달성</div>
      <div class="fh-value pct-${st}">${planned ? pct + '%' : '—'}</div>
      <div class="fh-sub">실제 ${fmt(actual)} / 예상 ${fmt(planned)}</div>
    </div>
    <div class="fm-overlay" style="--fm-scale:1.12">
      <div class="fm-speech">
        <p class="fm-quote">${escHtml(quote)}</p>
      </div>
      <div class="fm-panda-box">
        <div class="fm-panda-sprite" role="img" aria-label="노랑 판다"></div>
      </div>
    </div>
  </div>`;
}

function escHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function attachMascotEvents() {
  stopMascotQuoteRefresh();
  const quoteEl = document.querySelector('.fm-quote');
  startPandaAnimation();
  schedulePandaCharacterRotation();
  if (quoteEl) scheduleMascotQuoteRefresh(quoteEl);
}

function renderForecast() {
  const opts = { yjItems: YJ_CHECK_ITEMS, snItems: SN_CHECK_ITEMS };
  const actualByYear = aggregateActualInvestments(budgetChecks, getActual, opts);
  const years = getForecastYears(actualByYear, {}, TRACKER_YEARS);
  const projectedByYear = aggregateProjectedInvestments(years, opts);

  const fy = forecastYear;
  const planMonths = planMonthsInYear(fy);
  const actualYear = calcYearBreakdown(actualByYear, fy);
  const plannedYear = calcYearBreakdown(projectedByYear, fy);
  const yearPct = achievementPct(actualYear.total, plannedYear.total);
  const yearStatus = achievementStatus(yearPct);
  const yearRemain = Math.max(0, plannedYear.total - actualYear.total);

  const cumActual = calcCumulative(actualByYear, years);
  const cumPlanned = calcCumulative(projectedByYear, years);
  const grandActual = totalInvested(actualByYear, years);
  const grandPlanned = totalInvested(projectedByYear, years);
  const grandPct = achievementPct(grandActual, grandPlanned);

  const monthCount = countRecordedMonths(budgetChecks, getActual, opts);
  const maxAnnual = Math.max(1, ...years.map((y) => calcYearBreakdown(projectedByYear, y).total));

  const yearTabs = years.map((y) =>
    `<button type="button" class="forecast-year-tab${y === fy ? ' active' : ''}" data-fy="${y}">${y}년</button>`
  ).join('');

  const catCards = INVEST_CATEGORIES.map((cat) => {
    const planned = plannedYear.breakdown[cat.id]?.amount || 0;
    const actual = actualYear.breakdown[cat.id]?.amount || 0;
    if (!planned && !actual) return '';
    const pct = achievementPct(actual, planned);
    const st = achievementStatus(pct);
    const remain = Math.max(0, planned - actual);
    const planW = planned ? Math.min(100, planned / maxAnnual * 100) : 0;
    const actW = planned ? Math.min(planW, (actual / planned) * planW) : 0;
    const limitBadge = cat.limitNote
      ? `<span class="fc-cat-limit">${cat.limitNote}</span>` : '';
    return `<div class="fc-cat-card">
      <div class="fc-cat-head">
        <div class="fc-cat-name"><span class="fc-cat-dot" style="background:${cat.color}"></span>${cat.name}</div>
        ${limitBadge}
      </div>
      <div class="fc-cat-nums">
        <span>예상 <strong>${planned ? fmt(planned) : '—'}</strong></span>
        <span>실제 <strong>${actual ? fmt(actual) : '—'}</strong></span>
      </div>
      <div class="fc-dual-bar">
        <div class="planned" style="width:${planW}%"></div>
        <div class="actual" style="width:${actW}%;background:${cat.color}"></div>
      </div>
      <div class="fc-cat-foot">
        <span class="fc-cat-pct ${st}">${planned ? pct + '%' : '—'}</span>
        <span class="fc-cat-remain">${remain > 0 ? `${fmt(remain)} 남음` : actual >= planned && planned ? '✓ 달성' : ''}</span>
      </div>
    </div>`;
  }).filter(Boolean).join('');

  const chartRows = years.map((year) => {
    const planned = calcYearBreakdown(projectedByYear, year);
    const actual = calcYearBreakdown(actualByYear, year);
    const planSegs = INVEST_CATEGORIES.map((cat) => {
      const amt = planned.breakdown[cat.id]?.amount || 0;
      const w = maxAnnual ? (amt / maxAnnual * 100) : 0;
      return amt ? `<div class="fc-seg" style="width:${w}%;background:${cat.color};opacity:.35" title="예상 ${cat.name} ${fmt(amt)}"></div>` : '';
    }).join('');
    const actSegs = INVEST_CATEGORIES.map((cat) => {
      const amt = actual.breakdown[cat.id]?.amount || 0;
      const w = maxAnnual ? (amt / maxAnnual * 100) : 0;
      return amt ? `<div class="fc-seg" style="width:${w}%;background:${cat.color}" title="실제 ${cat.name} ${fmt(amt)}"></div>` : '';
    }).join('');
    return `<div class="fc-year-row">
      <div class="fc-year-label">${year}</div>
      <div class="fc-bar-wrap">
        <div class="fc-bar-planned">${planSegs}</div>
        <div class="fc-bar-actual-overlay">${actSegs}</div>
      </div>
      <div class="fc-year-plan">${planned.total ? fmt(planned.total) : '—'}</div>
      <div class="fc-year-total">${actual.total ? fmt(actual.total) : '—'}</div>
    </div>`;
  }).join('');

  const tableRows = INVEST_CATEGORIES.map((cat) => {
    let sumPlan = 0, sumAct = 0;
    const cells = years.map((y) => {
      const p = calcYearBreakdown(projectedByYear, y).breakdown[cat.id]?.amount || 0;
      const a = calcYearBreakdown(actualByYear, y).breakdown[cat.id]?.amount || 0;
      sumPlan += p;
      sumAct += a;
      const pct = achievementPct(a, p);
      const st = achievementStatus(pct);
      return `<td class="col-planned">${p ? fmt(p) : '—'}</td><td class="col-actual">${a ? fmt(a) : '—'}</td><td class="col-pct ${st}">${p ? pct + '%' : '—'}</td>`;
    }).join('');
    const totalPct = achievementPct(sumAct, sumPlan);
    const totalSt = achievementStatus(totalPct);
    const limit = cat.limitNote ? `<div class="ft-item-limit">${cat.limitNote}</div>` : '';
    return `<tr>
      <td class="ft-item-col">
        <div class="ft-item-name"><span class="ft-item-dot" style="background:${cat.color}"></span>${cat.name}</div>
        ${limit}
      </td>
      ${cells}
      <td class="col-planned">${sumPlan ? fmt(sumPlan) : '—'}</td>
      <td class="col-actual">${sumAct ? fmt(sumAct) : '—'}</td>
      <td class="col-pct ${totalSt}">${sumPlan ? totalPct + '%' : '—'}</td>
    </tr>`;
  }).join('');

  const dataColHead = (groupLabel) =>
    `<th class="col-planned ft-col-head"><span class="ft-head-group">${groupLabel}</span><span class="ft-head-sub planned">예상</span></th>` +
    `<th class="col-actual ft-col-head"><span class="ft-head-group">${groupLabel}</span><span class="ft-head-sub actual">실제</span></th>` +
    `<th class="col-pct ft-col-head"><span class="ft-head-group">${groupLabel}</span><span class="ft-head-sub pct">달성</span></th>`;
  const colHead = years.map((y) => dataColHead(`${y}년`)).join('') + dataColHead('합계');

  const colgroup = `<colgroup>
    <col class="ft-col-item">
    ${'<col class="ft-col-planned"><col class="ft-col-actual"><col class="ft-col-pct">'.repeat(years.length + 1)}
  </colgroup>`;

  const badge2026 = fy === 2026
    ? `<div class="forecast-badge-2026">🎯 ${fy}년 — ${planMonths}개월 계획 · IRP·연금저축 한도 최대 납입 목표</div>` : '';

  document.getElementById('forecast-section').innerHTML = `
    <div class="forecast-header">
      <div>
        <h3>📈 투자 전망</h3>
        <p>저축·투자·적금·청약 — 월 계획 <strong>예상</strong> vs 체크리스트 <strong>실제</strong></p>
      </div>
    </div>
    <div class="forecast-year-tabs" id="forecast-year-tabs">${yearTabs}</div>
    ${badge2026}
    <div class="forecast-hero">
      <div class="forecast-hero-card highlight">
        <div class="fh-label">${fy}년 달성률</div>
        <div class="fh-value pct-${yearStatus}">${plannedYear.total ? yearPct + '%' : '—'}</div>
        <div class="fh-sub">${yearRemain > 0 ? `${fmt(yearRemain)} 더 필요` : plannedYear.total ? '목표 달성!' : ''}</div>
      </div>
      <div class="forecast-hero-card">
        <div class="fh-label">${fy}년 예상</div>
        <div class="fh-value planned">${plannedYear.total ? fmt(plannedYear.total) : '—'}</div>
        <div class="fh-sub">월 계획 × ${planMonths}개월 · 한도 반영</div>
      </div>
      <div class="forecast-hero-card">
        <div class="fh-label">${fy}년 실제</div>
        <div class="fh-value actual">${actualYear.total ? fmt(actualYear.total) : '—'}</div>
        <div class="fh-sub">${monthCount}개월 기록</div>
      </div>
      ${renderForecastMascot(grandPct, grandActual, grandPlanned)}
    </div>
    <div class="fc-compare-section">
      <h4>${fy}년 항목별 달성</h4>
      <div class="fc-cat-grid">${catCards || '<div class="config-hint" style="margin:0">예상 데이터 없음</div>'}</div>
    </div>
    <div class="fc-legend-row">
      <span class="fc-legend-planned"><i></i> 예상 (월 계획)</span>
      <span class="fc-legend-actual"><i></i> 실제 (체크리스트)</span>
    </div>
    <div class="forecast-legend">${INVEST_CATEGORIES.map(c =>
      `<span><i style="background:${c.color}"></i>${c.name}</span>`
    ).join('')}</div>
    <div class="fc-chart">${chartRows}</div>
    <div class="forecast-table-wrap">
      <table class="forecast-table">
        ${colgroup}
        <thead>
          <tr><th class="ft-item-head">항목</th>${colHead}</tr>
        </thead>
        <tbody>
          ${tableRows}
          <tr class="total-row">
            <td class="ft-item-col ft-summary-label">연간 합계</td>
            ${years.map((y) => {
              const p = calcYearBreakdown(projectedByYear, y).total;
              const a = calcYearBreakdown(actualByYear, y).total;
              const pct = achievementPct(a, p);
              const st = achievementStatus(pct);
              return `<td class="col-planned">${p ? fmt(p) : '—'}</td><td class="col-actual">${a ? fmt(a) : '—'}</td><td class="col-pct ${st}">${p ? pct + '%' : '—'}</td>`;
            }).join('')}
            <td class="col-planned">${fmt(grandPlanned)}</td>
            <td class="col-actual">${fmt(grandActual)}</td>
            <td class="col-pct ${achievementStatus(grandPct)}">${grandPlanned ? grandPct + '%' : '—'}</td>
          </tr>
          <tr class="cum-row">
            <td class="ft-item-col ft-summary-label">누적 합계</td>
            ${years.map((y) => {
              const p = cumPlanned[y]?.cumulative || 0;
              const a = cumActual[y]?.cumulative || 0;
              const pct = achievementPct(a, p);
              const st = achievementStatus(pct);
              return `<td class="col-planned">${p ? fmt(p) : '—'}</td><td class="col-actual">${a ? fmt(a) : '—'}</td><td class="col-pct ${st}">${p ? pct + '%' : '—'}</td>`;
            }).join('')}
            <td class="col-planned">${fmt(grandPlanned)}</td>
            <td class="col-actual">${fmt(grandActual)}</td>
            <td class="col-pct ${achievementStatus(grandPct)}">${grandPlanned ? grandPct + '%' : '—'}</td>
          </tr>
        </tbody>
      </table>
    </div>
    <p class="forecast-note">
      · <strong>예상</strong>: 체크리스트 월 계획 기준 (${PLAN_START.year}년은 ${planMonthsInYear(PLAN_START.year)}개월) · 청년적금=미래+도약 합산<br>
      · IRP 연 한도 인당 ${(ANNUAL_LIMIT_PER_PERSON.irp / 10000).toFixed(0)}만 · 연금저축 연 한도 인당 ${(ANNUAL_LIMIT_PER_PERSON.pension / 10000).toFixed(0)}만 반영<br>
      · <strong>실제</strong>: 체크리스트에 입력한 금액만 합산 · 수익률 미반영
    </p>`;

  document.getElementById('forecast-year-tabs').onclick = (e) => {
    const btn = e.target.closest('[data-fy]');
    if (!btn) return;
    forecastYear = +btn.dataset.fy;
    renderForecast();
  };
  attachMascotEvents();
}

// 메인 탭 (계획 / 체크리스트)
document.getElementById('main-nav').addEventListener('click', e => {
  const btn = e.target.closest('.main-nav-btn');
  if (!btn) return;
  const page = btn.dataset.page;
  document.querySelectorAll('.main-nav-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.main-page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
});

// 렌더
const yjExp = sum(YJ.items) + (YJ.isa?.monthly ? sum(YJ.isa.rows) : 0);
const snExp = sum(SN.items) + (SN.isa?.monthly ? sum(SN.isa.rows) : 0);

document.getElementById('grid-both').innerHTML = renderPersonCard(YJ) + renderPersonCard(SN);

renderDashboard(yjExp, snExp);
renderISA();
renderWilliam();
renderLivingBudget();
renderForecast();

window.addEventListener('beforeunload', () => {
  syncFocusedInputs();
  flushPendingDetailSaves();
  persistChecksLocal(budgetChecks);
  if (hasUnsyncedCloudEdits()) markDirty();
});

const store = await initStore(applyRemoteChecks);
storeMode = store.mode;
lastCloudJson = checksJson(budgetChecks);
startRemotePolling();
const pfStore = await initPortfolioStore(setPortfolioFromRemote);
await initSymbolSearch();
initPortfolioModule(renderSymbolInput, pfStore.mode, {
  getPeriod,
  setPeriod,
});
onPeriodChange(() => {
  forecastYear = getPeriod().year;
  const trackerEl = document.getElementById('tracker-section');
  if (trackerEl?.querySelector('.year-tabs')) {
    renderTracker();
  }
  onPortfolioPeriodChange();
});
attachSymbolAutocomplete(document.getElementById('tracker-section'));
renderTracker();
</script>
</body>
</html>
