<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>영재 · 시온 월정산</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #222633;
      --border: rgba(255,255,255,.07);
      --text: #f0f2f5;
      --muted: #8b93a7;
      --yj: #5b8def;
      --yj-glow: rgba(91,141,239,.25);
      --sn: #b07cf7;
      --sn-glow: rgba(176,124,247,.25);
      --green: #34d399;
      --green-dim: rgba(52,211,153,.12);
      --red: #f87171;
      --red-dim: rgba(248,113,113,.12);
      --amber: #fbbf24;
      --amber-dim: rgba(251,191,36,.12);
      --radius: 20px;
      --radius-sm: 12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Pretendard", -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.55;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* 배경 그라데이션 */
    .bg-glow {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 60% 50% at 20% 0%, var(--yj-glow), transparent),
        radial-gradient(ellipse 50% 40% at 80% 10%, var(--sn-glow), transparent),
        radial-gradient(ellipse 40% 30% at 50% 100%, rgba(52,211,153,.08), transparent);
    }

    .app { position: relative; z-index: 1; max-width: 1140px; margin: 0 auto; padding: 32px 20px 64px; }

    /* ── HERO ── */
    .hero {
      text-align: center;
      padding: 40px 0 36px;
    }
    .hero-badge {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 8px 18px;
      background: linear-gradient(135deg, rgba(91,141,239,.2), rgba(176,124,247,.2));
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 100px;
      font-size: .82rem; font-weight: 600; color: #c4d4f7;
      margin-bottom: 20px;
      backdrop-filter: blur(8px);
    }
    .hero-badge .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 8px var(--green);
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    .hero h1 {
      font-size: clamp(1.8rem, 5vw, 2.6rem);
      font-weight: 800;
      letter-spacing: -.03em;
      background: linear-gradient(135deg, #fff 30%, #a8b8d8);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hero p { color: var(--muted); font-size: .92rem; margin-top: 10px; }

    .main-nav {
      display: flex; gap: 10px; margin-bottom: 28px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 6px;
    }
    .main-nav-btn {
      flex: 1; padding: 16px 20px; border: none; border-radius: 12px;
      background: transparent; color: var(--muted);
      font-family: inherit; font-size: 1rem; font-weight: 700;
      cursor: pointer; transition: all .25s;
    }
    .main-nav-btn:hover { color: var(--text); background: rgba(255,255,255,.03); }
    .main-nav-btn.active {
      background: linear-gradient(135deg, rgba(91,141,239,.25), rgba(176,124,247,.25));
      color: #fff; box-shadow: 0 4px 16px rgba(0,0,0,.25);
    }
    .main-page { display: none; animation: fadeIn .35s ease; }
    .main-page.active { display: block; }
    .plan-footer {
      text-align: center; color: var(--muted); font-size: .75rem;
      margin-top: 28px; line-height: 1.8;
    }
    @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }

    /* ── 요약 대시보드 ── */
    .dashboard {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 28px;
    }
    @media (min-width: 768px) { .dashboard { grid-template-columns: repeat(4, 1fr); } }

    .dash-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 22px;
      transition: transform .2s, border-color .2s;
    }
    .dash-card:hover { transform: translateY(-2px); border-color: rgba(255,255,255,.12); }
    .dash-card .icon { font-size: 1.3rem; margin-bottom: 10px; }
    .dash-card .lbl { font-size: .75rem; color: var(--muted); font-weight: 500; letter-spacing: .02em; }
    .dash-card .num {
      font-size: clamp(1.1rem, 3vw, 1.45rem);
      font-weight: 800; margin-top: 4px; letter-spacing: -.02em;
    }
    .dash-card.positive .num { color: var(--green); }
    .dash-card.negative .num { color: var(--red); }
    .dash-card.accent .num { color: var(--yj); }

    /* ── 예산 바 ── */
    .budget-bar-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px 28px;
      margin-bottom: 28px;
    }
    .budget-bar-wrap h3 { font-size: .85rem; color: var(--muted); font-weight: 600; margin-bottom: 16px; }
    .bar-labels { display: flex; justify-content: space-between; font-size: .78rem; color: var(--muted); margin-bottom: 8px; }
    .bar-track {
      height: 14px; background: var(--surface2); border-radius: 100px; overflow: hidden;
      display: flex;
    }
    .bar-income { background: linear-gradient(90deg, var(--yj), var(--sn)); height: 100%; border-radius: 100px; transition: width .8s ease; }
    .bar-expense { background: var(--amber); height: 100%; transition: width .8s ease; }
    .bar-legend { display: flex; gap: 20px; margin-top: 12px; font-size: .78rem; color: var(--muted); }
    .bar-legend span::before {
      content: ''; display: inline-block; width: 10px; height: 10px;
      border-radius: 3px; margin-right: 6px; vertical-align: middle;
    }
    .bar-legend .lg-income::before { background: linear-gradient(90deg, var(--yj), var(--sn)); }
    .bar-legend .lg-expense::before { background: var(--amber); }

    /* ── 탭 ── */
    .tabs {
      display: flex; gap: 8px; margin-bottom: 20px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 100px; padding: 5px;
    }
    .tab {
      flex: 1; padding: 10px; border: none; border-radius: 100px;
      background: transparent; color: var(--muted);
      font-family: inherit; font-size: .88rem; font-weight: 600;
      cursor: pointer; transition: all .25s;
    }
    .tab.active { background: var(--surface2); color: var(--text); box-shadow: 0 2px 8px rgba(0,0,0,.3); }
    .tab.yj.active { color: var(--yj); }
    .tab.sn.active { color: var(--sn); }
    .tab.both.active { background: linear-gradient(135deg, rgba(91,141,239,.15), rgba(176,124,247,.15)); color: #fff; }

    .panels .panel { display: none; animation: fadeIn .35s ease; }
    .panels .panel.active { display: block; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }

    /* ── 사람 카드 ── */
    .person-grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
    @media (min-width: 900px) { .person-grid.dual { grid-template-columns: 1fr 1fr; } }

    .pcard {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .pcard.yj { border-top: 3px solid var(--yj); }
    .pcard.sn { border-top: 3px solid var(--sn); }

    .pcard-top {
      padding: 28px 28px 20px;
      position: relative; overflow: hidden;
    }
    .pcard.yj .pcard-top { background: linear-gradient(160deg, rgba(91,141,239,.12) 0%, transparent 60%); }
    .pcard.sn .pcard-top { background: linear-gradient(160deg, rgba(176,124,247,.12) 0%, transparent 60%); }

    .pcard-top .who {
      font-size: .78rem; font-weight: 700; letter-spacing: .08em; text-transform: uppercase;
    }
    .pcard.yj .who { color: var(--yj); }
    .pcard.sn .who { color: var(--sn); }

    .pcard-top .income-num {
      font-size: 2rem; font-weight: 800; letter-spacing: -.03em; margin: 6px 0 2px;
    }
    .pcard-top .income-sub { font-size: .78rem; color: var(--muted); }

    .pcard-meter {
      margin-top: 18px;
      height: 6px; background: var(--surface2); border-radius: 100px; overflow: hidden;
    }
    .pcard-meter .fill { height: 100%; border-radius: 100px; transition: width .8s ease; }
    .pcard.yj .pcard-meter .fill { background: linear-gradient(90deg, var(--yj), #7aa8f7); }
    .pcard.sn .pcard-meter .fill { background: linear-gradient(90deg, var(--sn), #c99dfa); }
    .pcard-meter-label {
      display: flex; justify-content: space-between;
      font-size: .72rem; color: var(--muted); margin-top: 6px;
    }

    /* 카테고리 */
    .cat-block { padding: 0 20px; }
    .cat-head {
      display: flex; align-items: center; gap: 8px;
      padding: 14px 8px 8px;
      font-size: .72rem; font-weight: 700; color: var(--muted);
      letter-spacing: .06em; text-transform: uppercase;
    }
    .cat-head .emoji { font-size: .95rem; }

    .item-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 12px;
      border-radius: var(--radius-sm);
      transition: background .15s;
      gap: 12px;
    }
    .item-row:hover { background: rgba(255,255,255,.03); }

    .item-left { flex: 1; min-width: 0; }
    .item-name { font-size: .9rem; font-weight: 600; }
    .item-note { font-size: .75rem; color: var(--muted); margin-top: 2px; }
    .item-amt { font-size: .92rem; font-weight: 700; white-space: nowrap; }
    .item-amt.est { color: var(--muted); font-weight: 500; }

  .tag-est {
      display: inline-block; font-size: .65rem; font-weight: 600;
      padding: 2px 7px; border-radius: 4px;
      background: var(--amber-dim); color: var(--amber);
      margin-left: 6px; vertical-align: middle;
    }
    .tag-auto {
      display: inline-block; font-size: .65rem; font-weight: 600;
      padding: 2px 7px; border-radius: 4px;
      background: rgba(91,141,239,.15); color: var(--yj);
      margin-left: 6px; vertical-align: middle;
    }
    .pcard.sn .tag-auto { background: var(--sn-glow); color: var(--sn); }

    /* 연간 체크 */
    .tracker-page {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
    }
    .tracker-header {
      display: flex; flex-wrap: wrap; align-items: center;
      justify-content: space-between; gap: 12px; margin-bottom: 20px;
    }
    .tracker-header h3 { font-size: 1.1rem; font-weight: 800; }
    .sync-status {
      font-size: .78rem; font-weight: 600; padding: 6px 14px;
      border-radius: 100px; background: var(--surface2); color: var(--muted);
    }
    .sync-status.supabase { background: var(--green-dim); color: var(--green); }
    .sync-status.saving { background: var(--amber-dim); color: var(--amber); }
    .sync-status.error { background: var(--red-dim); color: var(--red); }

    .year-tabs, .month-tabs {
      display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px;
    }
    .year-tab, .month-tab {
      padding: 10px 20px; border-radius: 100px; border: 1px solid var(--border);
      background: var(--surface2); color: var(--muted);
      font-family: inherit; font-size: .85rem; font-weight: 700; cursor: pointer;
      transition: all .2s;
    }
    .year-tab.active { background: var(--sn-glow); border-color: var(--sn); color: var(--sn); }
    .month-tab { padding: 8px 14px; font-size: .8rem; }
    .month-tab.active { background: var(--sn); border-color: var(--sn); color: #fff; }

    .tracker-progress {
      display: flex; align-items: center; gap: 12px; margin-bottom: 18px;
      font-size: .82rem; color: var(--muted);
    }
    .tracker-progress .bar {
      flex: 1; height: 8px; background: var(--surface2); border-radius: 100px; overflow: hidden;
    }
    .tracker-progress .bar-fill {
      height: 100%; background: linear-gradient(90deg, var(--sn), #c99dfa);
      border-radius: 100px; transition: width .3s;
    }

    .check-list { display: flex; flex-direction: column; gap: 8px; }
    .check-item {
      display: grid;
      grid-template-columns: 22px 1fr auto 92px;
      align-items: center; gap: 10px;
      padding: 12px 14px; background: var(--surface2);
      border-radius: var(--radius-sm);
      border: 1px solid transparent; transition: all .15s;
    }
    .check-item:hover { border-color: rgba(255,255,255,.08); }
    .check-item.done { background: rgba(52,211,153,.08); border-color: rgba(52,211,153,.2); }
    .check-item .ci-check {
      width: 18px; height: 18px; accent-color: var(--sn); cursor: pointer;
    }
    .tracker-col.yj .ci-check { accent-color: var(--yj); }
    .check-item .ci-name { font-size: .85rem; font-weight: 600; min-width: 0; }
    .check-item .ci-name small { display: block; font-size: .68rem; color: var(--muted); font-weight: 500; }
    .check-item .ci-plan {
      font-size: .78rem; font-weight: 600; color: var(--muted); white-space: nowrap;
      text-align: right;
    }
    .check-item .ci-plan span { display: block; font-size: .62rem; color: var(--muted); opacity: .7; }
    .check-item .ci-actual {
      width: 92px; padding: 8px 10px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text);
      font-family: inherit; font-size: .8rem; text-align: right;
    }
    .check-item .ci-actual:focus { outline: none; border-color: var(--sn); }
    .tracker-col.yj .ci-actual:focus { border-color: var(--yj); }
    .check-item .ci-actual::placeholder { color: var(--muted); font-size: .72rem; }
    .check-item.done .ci-plan { color: var(--green); }

    .check-item-wrap { margin-bottom: 6px; }
    .item-details {
      margin: 0 0 8px 28px;
      padding: 0 12px 12px;
      background: rgba(0,0,0,.15);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: .8rem;
    }
    .item-details summary {
      padding: 10px 4px; cursor: pointer; font-weight: 600;
      color: var(--muted); list-style: none; user-select: none;
    }
    .item-details summary::-webkit-details-marker { display: none; }
    .item-details summary::before { content: '▸ '; }
    .item-details[open] summary::before { content: '▾ '; }
    .item-details[open] summary { color: var(--text); }
    .detail-table { width: 100%; border-collapse: collapse; margin-top: 4px; }
    .detail-table th {
      text-align: left; font-size: .65rem; color: var(--muted);
      font-weight: 600; padding: 4px 6px 6px 0;
    }
    .detail-table td { padding: 4px 6px 4px 0; vertical-align: middle; }
    .detail-table input, .detail-table select {
      width: 100%; padding: 7px 8px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 6px; color: var(--text);
      font-family: inherit; font-size: .78rem;
    }
    .detail-table input:focus, .detail-table select:focus {
      outline: none; border-color: var(--yj);
    }
    .tracker-col.sn .detail-table input:focus,
    .tracker-col.sn .detail-table select:focus { border-color: var(--sn); }
    .detail-table .dl-remove {
      width: 28px; height: 28px; padding: 0; border: none;
      background: var(--red-dim); color: var(--red);
      border-radius: 6px; cursor: pointer; font-size: 1rem; line-height: 1;
    }
    .detail-foot {
      display: flex; justify-content: space-between; align-items: center;
      margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border);
    }
    .detail-add {
      padding: 6px 12px; border: 1px dashed var(--border);
      background: transparent; color: var(--muted);
      border-radius: 8px; font-family: inherit; font-size: .75rem;
      font-weight: 600; cursor: pointer;
    }
    .detail-add:hover { border-color: var(--green); color: var(--green); }
    .detail-total { font-size: .78rem; font-weight: 700; color: var(--green); }
    .detail-total span { color: var(--muted); font-weight: 500; margin-right: 6px; }

    /* 투자 전망 */
    .forecast-page { animation: fadeIn .35s ease; }
    .forecast-header {
      display: flex; flex-wrap: wrap; justify-content: space-between;
      align-items: flex-start; gap: 16px; margin-bottom: 24px;
    }
    .forecast-header h3 { font-size: 1.15rem; font-weight: 800; }
    .forecast-header p { font-size: .82rem; color: var(--muted); margin-top: 4px; }
    .forecast-hero {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 28px;
    }
    @media (max-width: 700px) { .forecast-hero { grid-template-columns: 1fr; } }
    .forecast-hero-card {
      padding: 20px; border-radius: var(--radius-sm);
      background: var(--surface2); border: 1px solid var(--border); text-align: center;
    }
    .forecast-hero-card.highlight {
      background: linear-gradient(135deg, rgba(91,141,239,.12), rgba(176,124,247,.12));
      border-color: rgba(255,255,255,.1);
    }
    .forecast-hero-card .fh-label { font-size: .72rem; color: var(--muted); margin-bottom: 6px; }
    .forecast-hero-card .fh-value { font-size: 1.35rem; font-weight: 800; }
    .forecast-legend {
      display: flex; flex-wrap: wrap; gap: 10px 16px; margin-bottom: 20px;
    }
    .forecast-legend span {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: .75rem; color: var(--muted);
    }
    .forecast-legend i {
      width: 10px; height: 10px; border-radius: 3px; display: inline-block;
    }
    .fc-year-row {
      display: grid; grid-template-columns: 52px 1fr 110px;
      align-items: center; gap: 12px; margin-bottom: 10px;
    }
    @media (max-width: 500px) {
      .fc-year-row { grid-template-columns: 44px 1fr; }
      .fc-year-total { grid-column: 2; text-align: left; font-size: .85rem; }
    }
    .fc-year-label { font-size: .85rem; font-weight: 700; }
    .fc-bar-track {
      height: 36px; background: var(--surface2); border-radius: 8px;
      overflow: hidden; display: flex; min-width: 0;
    }
    .fc-seg { height: 100%; min-width: 2px; transition: width .4s ease; }
    .fc-year-total { font-size: .9rem; font-weight: 800; text-align: right; white-space: nowrap; }
    .forecast-table-wrap {
      margin-top: 28px; overflow-x: auto;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 16px;
    }
    .forecast-table {
      width: 100%; border-collapse: collapse; font-size: .82rem;
    }
    .forecast-table th, .forecast-table td {
      padding: 10px 12px; text-align: right; border-bottom: 1px solid var(--border);
    }
    .forecast-table th:first-child, .forecast-table td:first-child { text-align: left; }
    .forecast-table th { font-size: .72rem; color: var(--muted); font-weight: 600; }
    .forecast-table tr.total-row td { font-weight: 800; border-top: 2px solid var(--border); }
    .forecast-table tr.cum-row td { color: var(--green); font-weight: 700; }
    .forecast-note {
      margin-top: 16px; font-size: .75rem; color: var(--muted); line-height: 1.7;
    }

    .wallet-box {
      padding: 16px; border-radius: var(--radius-sm);
      background: var(--surface2); margin-bottom: 14px;
      border: 1px solid var(--border);
    }
    .wallet-income {
      font-size: 1.35rem; font-weight: 800; letter-spacing: -.02em; margin-bottom: 2px;
    }
    .tracker-col.yj .wallet-income { color: var(--yj); }
    .tracker-col.sn .wallet-income { color: var(--sn); }
    .wallet-sub { font-size: .72rem; color: var(--muted); margin-bottom: 12px; }
    .wallet-rows { display: flex; flex-direction: column; gap: 6px; }
    .wallet-row {
      display: flex; justify-content: space-between; font-size: .82rem;
    }
    .wallet-row .wl { color: var(--muted); }
    .wallet-row .wv { font-weight: 700; }
    .wallet-row.remain { margin-top: 8px; padding-top: 10px; border-top: 1px solid var(--border); }
    .wallet-row.remain .wv { font-size: 1rem; }
    .wallet-row.remain.positive .wv { color: var(--green); }
    .wallet-row.remain.negative .wv { color: var(--red); }
    .wallet-bar {
      height: 6px; background: var(--surface); border-radius: 100px;
      margin-top: 12px; overflow: hidden;
    }
    .wallet-bar-fill { height: 100%; border-radius: 100px; transition: width .3s; }
    .tracker-col.yj .wallet-bar-fill { background: linear-gradient(90deg, var(--yj), #7aa8f7); }
    .tracker-col.sn .wallet-bar-fill { background: linear-gradient(90deg, var(--sn), #c99dfa); }

    .household-wallet {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;
      margin-bottom: 20px; padding: 16px; border-radius: var(--radius-sm);
      background: var(--surface2); border: 1px solid var(--border);
    }
    @media (max-width: 600px) { .household-wallet { grid-template-columns: 1fr; } }
    .hw-item { text-align: center; }
    .hw-item .hl { font-size: .72rem; color: var(--muted); }
    .hw-item .hv { font-size: 1.05rem; font-weight: 800; margin-top: 2px; }
    .hw-item.remain .hv { color: var(--green); }
    .hw-item.remain.neg .hv { color: var(--red); }

    .check-section-label {
      font-size: .72rem; font-weight: 700; letter-spacing: .04em;

function sum(items) { return items.reduce((s, i) => s + i.amt, 0); }

function renderIsaBlock(person) {
  if (!person.isa) return '';
  const isa = person.isa;
  const total = isa.rows.reduce((s, r) => s + r.amt, 0);
  const totalLabel = isa.monthly ? '월 납입' : '7월 합계';
  return `<div class="isa-block${person.key === 'sn' ? ' sn-isa' : ''}">
    <div class="isa-block-title">🏦 ${isa.title} <span class="tag-once">${isa.tag}</span></div>

        <span class="isa-lbl">${r.label}</span>

function renderPersonCard(person) {
  const monthlyIsa = person.isa?.monthly ? sum(person.isa.rows) : 0;
  const expense = sum(person.items) + monthlyIsa;
  const balance = person.income - expense;
  const pct = Math.min(100, (expense / person.income) * 100);
  const cats = [...new Set(person.items.map(i => i.cat))];

  let body = '';
  for (const cat of cats) {
    body += `<div class="cat-block">
      <div class="cat-head"><span class="emoji">${CAT_EMOJI[cat] || '•'}</span>${cat}</div>`;
    for (const item of person.items.filter(i => i.cat === cat)) {
      const tags = [
        item.estimate ? '<span class="tag-est">예상</span>' : '',
        item.auto ? '<span class="tag-auto">자동이체</span>' : '',
      ].join('');
      body += `<div class="item-row">
        <div class="item-left">
          <div class="item-name">${item.name}${tags}</div>
          ${item.note ? `<div class="item-note">${item.note}</div>` : ''}
        </div>
        <div class="item-amt${item.estimate ? ' est' : ''}">${fmt(item.amt)}</div>
      </div>`;
    }
    body += `</div>`;
  }

  const isaBlock = renderIsaBlock(person);

  return `<div class="pcard ${person.key}">
    <div class="pcard-top">
      <div class="who">${person.name}</div>
      <div class="income-num">${fmt(person.income)}</div>
      <div class="income-sub">월 실수령액 (세후)</div>

      <div class="living-sum-card total">
        <div class="sl">생활비 합계</div>
        <div class="sv" id="living-total">—</div>
      </div>

      const v = +sel.value;
      total += v;
      sel.closest('.living-row').querySelector('.living-amt-display').textContent = fmt(v);

    const pct = budget > 0 ? (total / budget * 100).toFixed(1) : 0;

    document.getElementById('living-total').textContent = fmt(total);
    document.getElementById('living-left').textContent = (left < 0 ? '−' : '') + fmt(Math.abs(left));

    const vals = LIVING_PRESETS[name];
    document.querySelectorAll('.living-sel').forEach((sel, i) => {

      const opt = [...sel.options].find(o => +o.value === target);

      else {
        const newOpt = document.createElement('option');
        newOpt.value = target;
        newOpt.textContent = fmt(target);
        newOpt.selected = true;
        sel.appendChild(newOpt);

      b.classList.toggle('active', b.dataset.preset === name));

    sel.addEventListener('change', () => {
      document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
      updateLiving();
    }));

  document.querySelectorAll('.preset-btn').forEach(btn =>
    btn.addEventListener('click', () => applyPreset(btn.dataset.preset)));

  applyPreset('normal');
}

function setSyncStatus(state, text) {
  const el = document.getElementById('sync-status');
  if (!el) return;
  el.className = 'sync-status' + (state ? ' ' + state : '');
  el.textContent = text;
}

function scheduleSave() {
  setSyncStatus('saving', '저장 중…');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    const res = await saveChecks(budgetChecks);
    if (res.ok && res.mode === 'supabase') setSyncStatus('supabase', 'Supabase 저장됨');
    else if (res.ok) setSyncStatus('', '브라우저에 저장됨');
    else setSyncStatus('error', '저장 실패 — 로컬만');
  }, 500);
}

function getVisibleItems(person) {
  const items = person === 'yj' ? YJ_CHECK_ITEMS : SN_CHECK_ITEMS;
  return items.filter(it => !it.julyOnly || trackerMonth === '7');
}

function getMonthlyItems(person) {
  return getVisibleItems(person).filter(it => !it.fromSavings);
}

function getSavingsItems(person) {
  return getVisibleItems(person).filter(it => it.fromSavings);
}

function itemSubLabel(it) {
  if (it.fromSavings) return '<small class="tag-savings">목돈 · 월급 제외</small>';
  if (it.auto) return '<small>자동이체</small>';
  return '<small>직접 관리</small>';
}

function calcSavingsStats(person) {
  const items = getSavingsItems(person);
  let planned = 0, actual = 0, checkedCount = 0;
  for (const it of items) {
    if (!getCheck(budgetChecks, trackerYear, trackerMonth, person, it.id)) continue;
    checkedCount++;
    planned += it.amt;
    const a = getActual(budgetChecks, trackerYear, trackerMonth, person, it.id);
    actual += a !== null ? a : it.amt;
  }
  return { planned, actual, checkedCount, total: items.length };
}

function calcPersonWallet(person) {
  const income = person === 'yj' ? YJ.income : SN.income;
  const items = getMonthlyItems(person);
  let plannedChecked = 0;
  let actualSpent = 0;
  let checkedCount = 0;
  for (const it of items) {
    if (!getCheck(budgetChecks, trackerYear, trackerMonth, person, it.id)) continue;
    checkedCount++;
    plannedChecked += it.amt;
    const actual = getActual(budgetChecks, trackerYear, trackerMonth, person, it.id);
    actualSpent += actual !== null ? actual : it.amt;
  }
  const spendPct = income > 0 ? Math.min(100, actualSpent / income * 100) : 0;
  const savings = calcSavingsStats(person);
  return {
    income, plannedChecked, actualSpent,
    remaining: income - actualSpent,
    checkedCount, total: items.length, spendPct, savings,
  };
}

function formatActualInput(val) {
  if (val === null) return '';
  return val.toLocaleString('ko-KR');

function parseActualInput(str) {
  const n = String(str).replace(/[^0-9]/g, '');
  return n === '' ? '' : Number(n);
}

function updateWalletSummaries() {
  for (const person of ['yj', 'sn']) {
    const w = calcPersonWallet(person);
    const el = id => document.getElementById(id);
    if (!el(`w-planned-${person}`)) continue;
    el(`w-planned-${person}`).textContent = fmt(w.plannedChecked);
    el(`w-actual-${person}`).textContent = fmt(w.actualSpent);
    el(`w-remain-${person}`).textContent = (w.remaining < 0 ? '−' : '') + fmt(Math.abs(w.remaining));
    el(`w-remain-${person}`).closest('.wallet-row').className =
      `wallet-row remain ${w.remaining >= 0 ? 'positive' : 'negative'}`;
    el(`w-bar-${person}`).style.width = w.spendPct.toFixed(1) + '%';
    const savEl = el(`w-savings-${person}`);
    if (savEl) savEl.textContent = fmt(w.savings.actual);
    const savChk = el(`w-savings-chk-${person}`);
    if (savChk) savChk.textContent = `${w.savings.checkedCount}/${w.savings.total}`;
    const prog = document.querySelector(`.tracker-col.${person} .tracker-col-progress`);
    if (prog) {
      let t = `월급 ${w.checkedCount}/${w.total}`;
      if (w.savings.total > 0) t += ` · 목돈 ${w.savings.checkedCount}/${w.savings.total}`;
      prog.textContent = t;
    }
  }
  const yj = calcPersonWallet('yj');
  const sn = calcPersonWallet('sn');
  const hIncome = yj.income + sn.income;
  const hActual = yj.actualSpent + sn.actualSpent;
  const hRemain = hIncome - hActual;
  const hw = document.getElementById('household-wallet');
  if (hw) {
    hw.querySelector('[data-hw=income]').textContent = fmt(hIncome);
    hw.querySelector('[data-hw=spent]').textContent = fmt(hActual);
    const remEl = hw.querySelector('[data-hw=remain]');
    remEl.textContent = (hRemain < 0 ? '−' : '') + fmt(Math.abs(hRemain));
    hw.querySelector('.hw-item.remain').classList.toggle('neg', hRemain < 0);
  }
  const yjV = getVisibleItems('yj');
  const snV = getVisibleItems('sn');
  const done =
    yjV.filter(it => getCheck(budgetChecks, trackerYear, trackerMonth, 'yj', it.id)).length +
    snV.filter(it => getCheck(budgetChecks, trackerYear, trackerMonth, 'sn', it.id)).length;
  const all = yjV.length + snV.length;
  const bar = document.getElementById('household-check-bar');
  if (bar) bar.style.width = (all ? done / all * 100 : 0) + '%';
  const cnt = document.getElementById('household-check-count');
  if (cnt) cnt.textContent = `${done}/${all}`;
}

function livingCategoryOptions(fixedCat) {
  if (fixedCat) return [fixedCat];
  const names = LIVING_CATS.map(c => c.name);
  return [...new Set([...names, ...LIVING_DETAIL_EXTRA])];
}

function defaultDetail(it) {
  if (it.detailType === 'invest') {
    return { type: 'invest', lines: [{ symbol: '', shares: '', amount: '' }] };
  }
  if (it.detailType === 'living') {
    const cat = it.livingFixedCat || LIVING_CATS[0]?.name || '기타';
    return { type: 'living', lines: [{ category: cat, amount: '' }] };
  }
  return null;
}

function ensureDetail(person, it) {
  let d = getDetail(budgetChecks, trackerYear, trackerMonth, person, it.id);
  if (!d || !Array.isArray(d.lines) || !d.lines.length) d = defaultDetail(it);
  return d;
}

function sumDetailAmount(detail) {
  if (!detail?.lines) return 0;
  return detail.lines.reduce((s, ln) => s + (Number(String(ln.amount).replace(/,/g, '')) || 0), 0);
}

function escAttr(s) {
  return String(s ?? '').replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;');
}

function formatDetailAmt(v) {
  if (v === '' || v == null) return '';
  const n = Number(String(v).replace(/,/g, ''));
  return n ? n.toLocaleString('ko-KR') : '';
}

function renderInvestLines(lines) {
  return lines.map((ln, i) => `
    <tr class="detail-line" data-idx="${i}">
      <td><input class="dl-symbol" placeholder="종목명" value="${escAttr(ln.symbol)}"></td>
      <td style="width:56px"><input class="dl-shares" placeholder="주" inputmode="numeric" value="${escAttr(ln.shares)}"></td>
      <td><input class="dl-amount" placeholder="금액" inputmode="numeric" value="${formatDetailAmt(ln.amount)}"></td>
      <td style="width:32px"><button type="button" class="dl-remove" title="삭제">×</button></td>
    </tr>`).join('');
}

function renderLivingLines(lines, fixedCat) {
  const opts = livingCategoryOptions(fixedCat);
  return lines.map((ln, i) => {
    const cat = ln.category || opts[0];
    const catCell = fixedCat
      ? `<span style="color:var(--muted);font-size:.78rem">${escAttr(fixedCat)}</span><input type="hidden" class="dl-category" value="${escAttr(fixedCat)}">`
      : `<select class="dl-category">${opts.map(o => `<option value="${escAttr(o)}"${o === cat ? ' selected' : ''}>${escAttr(o)}</option>`).join('')}</select>`;
    return `<tr class="detail-line" data-idx="${i}">
      <td colspan="2">${catCell}</td>
      <td><input class="dl-amount" placeholder="금액" inputmode="numeric" value="${formatDetailAmt(ln.amount)}"></td>
      <td style="width:32px"><button type="button" class="dl-remove" title="삭제">×</button></td>
    </tr>`;
  }).join('');
}

function renderDetailPanel(person, it) {
  if (!it.detailType) return '';
  const detail = ensureDetail(person, it);
  const total = sumDetailAmount(detail);
  const summaryLabel = it.detailType === 'invest' ? '📋 매수 상세 (종목·주·금액)' : '📋 지출 상세 (분류별)';

  if (it.detailType === 'invest') {
    return `<details class="item-details" data-person="${person}" data-id="${it.id}" data-type="invest">
      <summary>${summaryLabel}</summary>
      <table class="detail-table">
        <thead><tr><th>종목</th><th>주</th><th>금액</th><th></th></tr></thead>
        <tbody class="detail-body">${renderInvestLines(detail.lines)}</tbody>
      </table>
      <div class="detail-foot">
        <button type="button" class="detail-add" data-person="${person}" data-id="${it.id}">+ 종목 추가</button>
        <div class="detail-total"><span>합계</span><span class="dt-val">${fmt(total)}</span></div>
      </div>
    </details>`;
  }

  return `<details class="item-details" data-person="${person}" data-id="${it.id}" data-type="living">
    <summary>${summaryLabel}</summary>
    <table class="detail-table">
      <thead><tr><th colspan="2">분류</th><th>금액</th><th></th></tr></thead>
      <tbody class="detail-body">${renderLivingLines(detail.lines, it.livingFixedCat)}</tbody>
    </table>
    <div class="detail-foot">
      <button type="button" class="detail-add" data-person="${person}" data-id="${it.id}"${it.livingFixedCat ? ' style="display:none"' : ''}>+ 항목 추가</button>
      <div class="detail-total"><span>합계</span><span class="dt-val">${fmt(total)}</span></div>
    </div>
  </details>`;
}

function getCheckItemDef(person, id) {
  const items = person === 'yj' ? YJ_CHECK_ITEMS : SN_CHECK_ITEMS;
  return items.find(x => x.id === id);
}

function readDetailFromWrap(detailsEl) {
  const type = detailsEl.dataset.type;
  const it = getCheckItemDef(detailsEl.dataset.person, detailsEl.dataset.id);
  const lines = [...detailsEl.querySelectorAll('.detail-line')].map(row => {
    if (type === 'invest') {
      return {
        symbol: row.querySelector('.dl-symbol')?.value || '',
        shares: row.querySelector('.dl-shares')?.value || '',
        amount: parseActualInput(row.querySelector('.dl-amount')?.value || ''),
      };
    }
    return {
      category: row.querySelector('.dl-category')?.value || it?.livingFixedCat || '',
      amount: parseActualInput(row.querySelector('.dl-amount')?.value || ''),
    };
  });
  return { type, lines };
}

function syncDetailToStore(detailsEl) {
  const person = detailsEl.dataset.person;
  const id = detailsEl.dataset.id;
  const detail = readDetailFromWrap(detailsEl);
  budgetChecks = setDetail(budgetChecks, trackerYear, trackerMonth, person, id, detail);
  const total = sumDetailAmount(detail);
  const dtVal = detailsEl.querySelector('.dt-val');
  if (dtVal) dtVal.textContent = fmt(total);
  const wrap = detailsEl.closest('.check-item-wrap');
  const actualInp = wrap?.querySelector('.ci-actual');
  if (actualInp) {
    actualInp.value = total ? formatActualInput(total) : '';
    budgetChecks = setActual(budgetChecks, trackerYear, trackerMonth, person, id, total || '');
  }
  updateWalletSummaries();
  scheduleSave();
}

function renderCheckRow(person, it) {
  const checked = getCheck(budgetChecks, trackerYear, trackerMonth, person, it.id);
  const actual = getActual(budgetChecks, trackerYear, trackerMonth, person, it.id);
  const detailPanel = renderDetailPanel(person, it);
  return `<div class="check-item-wrap" data-person="${person}" data-id="${it.id}">
    <div class="check-item${checked ? ' done' : ''}" data-person="${person}" data-id="${it.id}">
      <input type="checkbox" class="ci-check" data-person="${person}" data-id="${it.id}" ${checked ? 'checked' : ''}>
      <div class="ci-name">${it.name}${itemSubLabel(it)}</div>
      <div class="ci-plan"><span>계획</span>${fmtShort(it.amt)}</div>
      <input type="text" class="ci-actual" data-person="${person}" data-id="${it.id}"
        placeholder="실제 금액" inputmode="numeric"
        value="${formatActualInput(actual)}">
    </div>
    ${detailPanel}
  </div>`;
}

function renderCheckColumn(person, items, colorClass) {
  const monthly = getMonthlyItems(person);
  const savings = getSavingsItems(person);
  const w = calcPersonWallet(person);

  const monthlyRows = monthly.map(it => renderCheckRow(person, it)).join('');
  const savingsBlock = savings.length ? `
    <div class="check-section-label savings">💰 목돈에서 (월급 제외)</div>
    <div class="check-list">${savings.map(it => renderCheckRow(person, it)).join('')}</div>` : '';

  const label = person === 'yj' ? '영재' : '시온';
  let prog = `월급 ${w.checkedCount}/${w.total}`;
  if (w.savings.total > 0) prog += ` · 목돈 ${w.savings.checkedCount}/${w.savings.total}`;

  return `<div class="tracker-col ${colorClass}" data-col="${person}">
    <div class="tracker-col-head">
      <h4>${label}</h4>
      <span class="tracker-col-progress">${prog}</span>
    </div>
    ${renderWalletBox(person)}
    <div class="check-section-label">📅 월급에서 (실수령 기준)</div>
    <div class="check-list">${monthlyRows}</div>
    ${savingsBlock}
  </div>`;
}

function attachTrackerEvents() {
  const section = document.getElementById('tracker-section');

  section.onclick = e => {
    const addBtn = e.target.closest('.detail-add');
    if (addBtn) {
      e.preventDefault();
      const person = addBtn.dataset.person;
      const id = addBtn.dataset.id;
      const it = getCheckItemDef(person, id);
      const detailsEl = addBtn.closest('.item-details');
      const detail = readDetailFromWrap(detailsEl);
      if (it.detailType === 'invest') {
        detail.lines.push({ symbol: '', shares: '', amount: '' });
        detailsEl.querySelector('.detail-body').insertAdjacentHTML('beforeend', renderInvestLines([detail.lines.at(-1)]));
      } else {
        detail.lines.push({ category: it.livingFixedCat || LIVING_CATS[0].name, amount: '' });
        detailsEl.querySelector('.detail-body').insertAdjacentHTML('beforeend', renderLivingLines([detail.lines.at(-1)], it.livingFixedCat));
      }
      budgetChecks = setDetail(budgetChecks, trackerYear, trackerMonth, person, id, detail);
      scheduleSave();
      return;
    }
    const rmBtn = e.target.closest('.dl-remove');
    if (rmBtn) {
      e.preventDefault();
      const detailsEl = rmBtn.closest('.item-details');
      const body = detailsEl.querySelector('.detail-body');
      if (body.querySelectorAll('.detail-line').length <= 1) return;
      rmBtn.closest('.detail-line').remove();
      syncDetailToStore(detailsEl);
    }
  };

  section.onchange = e => {
    const cb = e.target.closest('.ci-check');
    if (cb) {
      budgetChecks = setCheck(budgetChecks, trackerYear, trackerMonth, cb.dataset.person, cb.dataset.id, cb.checked);
      cb.closest('.check-item').classList.toggle('done', cb.checked);
      updateWalletSummaries();
      scheduleSave();
      return;
    }
    const detailsEl = e.target.closest('.item-details');
    if (detailsEl) syncDetailToStore(detailsEl);
  };

  section.oninput = e => {
    const inp = e.target.closest('.ci-actual');
    if (inp) {
      const val = parseActualInput(inp.value);
      budgetChecks = setActual(budgetChecks, trackerYear, trackerMonth, inp.dataset.person, inp.dataset.id, val);
      updateWalletSummaries();
      scheduleSave();
      return;
    }
    const detailsEl = e.target.closest('.item-details');
    if (detailsEl) {
      clearTimeout(detailsEl._detailTimer);
      detailsEl._detailTimer = setTimeout(() => syncDetailToStore(detailsEl), 400);
    }
  };

  section.addEventListener('blur', e => {
    const inp = e.target.closest('.ci-actual');
    if (inp) {
      const actual = getActual(budgetChecks, trackerYear, trackerMonth, inp.dataset.person, inp.dataset.id);
      inp.value = formatActualInput(actual);
      return;
    }
    const amt = e.target.closest('.dl-amount');
    if (amt) {
      const n = parseActualInput(amt.value);
      amt.value = n ? formatActualInput(n) : '';
      const detailsEl = amt.closest('.item-details');
      if (detailsEl) syncDetailToStore(detailsEl);
    }
  }, true);
}

function renderTracker() {
  const yjItems = YJ_CHECK_ITEMS;
  const snItems = SN_CHECK_ITEMS;
  const yj = calcPersonWallet('yj');
  const sn = calcPersonWallet('sn');
  const hIncome = yj.income + sn.income;
  const hActual = yj.actualSpent + sn.actualSpent;
  const hRemain = hIncome - hActual;

  const yearBtns = TRACKER_YEARS.map(y =>
    `<button class="year-tab${y === trackerYear ? ' active' : ''}" data-year="${y}">${y}년</button>`
  ).join('');

  const monthBtns = MONTH_LABELS.map((lbl, i) => {
    const m = String(i + 1);
    return `<button class="month-tab${m === trackerMonth ? ' active' : ''}" data-month="${m}">${lbl}</button>`;
  }).join('');

  const yjV = getVisibleItems('yj');
  const snV = getVisibleItems('sn');
  const totalDone = yj.checkedCount + sn.checkedCount;
  const totalAll = yjV.length + snV.length;
  const pct = totalAll ? (totalDone / totalAll * 100) : 0;

  const sbHint = storeMode === 'local'
    ? `<div class="config-hint">⚠️ Supabase 미연결 — 브라우저에만 저장됩니다.</div>`
    : '';

  document.getElementById('tracker-section').innerHTML = `
    <div class="tracker-header">
      <h3>✅ 월별 체크리스트</h3>
      <span class="sync-status" id="sync-status">${storeMode === 'supabase' ? 'Supabase 연결됨' : '로컬 저장'}</span>
    </div>
    <div class="year-tabs" id="year-tabs">${yearBtns}</div>
    <div class="month-tabs" id="month-tabs">${monthBtns}</div>
    <div class="household-wallet" id="household-wallet">
      <div class="hw-item"><div class="hl">가구 실수령</div><div class="hv" data-hw="income">${fmt(hIncome)}</div></div>
      <div class="hw-item"><div class="hl">실제 지출 합계</div><div class="hv" data-hw="spent">${fmt(hActual)}</div></div>
      <div class="hw-item remain${hRemain < 0 ? ' neg' : ''}"><div class="hl">가구 남는 돈</div><div class="hv" data-hw="remain">${hRemain < 0 ? '−' : ''}${fmt(Math.abs(hRemain))}</div></div>
    </div>
    <div class="tracker-progress">
      <span>${trackerYear}년 ${trackerMonth}월 · 체크 진행</span>
      <div class="bar"><div class="bar-fill" id="household-check-bar" style="width:${pct}%"></div></div>
      <strong id="household-check-count">${totalDone}/${totalAll}</strong>
    </div>
    <div class="tracker-dual">
      ${renderCheckColumn('yj', yjItems, 'yj')}
      ${renderCheckColumn('sn', snItems, 'sn')}
    </div>
    ${sbHint}`;

  document.getElementById('year-tabs').onclick = e => {
    const btn = e.target.closest('[data-year]');
    if (!btn) return;
    trackerYear = +btn.dataset.year;
    renderTracker();
    attachTrackerEvents();
  };

  document.getElementById('month-tabs').onclick = e => {
    const btn = e.target.closest('[data-month]');
    if (!btn) return;
    trackerMonth = btn.dataset.month;
    renderTracker();
    attachTrackerEvents();
  };

  attachTrackerEvents();
}

function renderWilliam() {
  document.getElementById('william-section').innerHTML = `
    <div class="william-icon">📦</div>
    <div class="william-title">윌리엄 (영재)</div>
    <div class="william-desc">780만원 · 무이자 · 12개월 할부<br>7월부터 매월 납부</div>
    <div class="william-amt">월 ${fmt(650000)}</div>`;
}

function renderForecast() {
  const cum = calcCumulative(FORECAST_YEARS[FORECAST_YEARS.length - 1]);
  const y2026 = cum[2026]?.cumulative || 0;
  const yLast = cum[FORECAST_YEARS[FORECAST_YEARS.length - 1]]?.cumulative || 0;
  const maxAnnual = Math.max(...FORECAST_YEARS.map(y => calcYearBreakdown(y).total));

  const legend = INVEST_CATEGORIES.map(c =>
    `<span><i style="background:${c.color}"></i>${c.name}</span>`
  ).join('');

  const chartRows = FORECAST_YEARS.map(year => {
    const { breakdown, total } = calcYearBreakdown(year);
    const segs = INVEST_CATEGORIES.map(cat => {
      const amt = breakdown[cat.id]?.amount || 0;
      const w = maxAnnual ? (amt / maxAnnual * 100) : 0;
      const title = `${cat.name} ${fmt(amt)}`;
      return amt ? `<div class="fc-seg" style="width:${w}%;background:${cat.color}" title="${title}"></div>` : '';
    }).join('');
    return `<div class="fc-year-row">
      <div class="fc-year-label">${year}</div>
      <div class="fc-bar-track">${segs}</div>
      <div class="fc-year-total">${fmt(total)}</div>
    </div>`;
  }).join('');

  const tableHead = `<tr><th>항목</th>${FORECAST_YEARS.map(y => `<th>${y}년</th>`).join('')}<th>5년 합계</th></tr>`;
  const catRows = INVEST_CATEGORIES.map(cat => {
    let rowSum = 0;
    const cells = FORECAST_YEARS.map(y => {
      const amt = calcYearBreakdown(y).breakdown[cat.id]?.amount || 0;
      rowSum += amt;
      return `<td>${amt ? fmt(amt) : '—'}</td>`;
    }).join('');
    return `<tr><td><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:${cat.color};margin-right:6px"></span>${cat.name}</td>${cells}<td>${fmt(rowSum)}</td></tr>`;
  }).join('');

  const annualCells = FORECAST_YEARS.map(y => `<td>${fmt(calcYearBreakdown(y).total)}</td>`).join('');
  const cumCells = FORECAST_YEARS.map(y => `<td>${fmt(cum[y]?.cumulative || 0)}</td>`).join('');

  document.getElementById('forecast-section').innerHTML = `
    <div class="forecast-header">
      <div>
        <h3>📈 투자 전망</h3>
        <p>ISA · IRP · 연금저축 · 국장 · 미장 · 코인+금 — 월 자동이체 계획 기준 (청약·적금 제외)</p>
      </div>
    </div>
    <div class="forecast-hero">
      <div class="forecast-hero-card highlight">
        <div class="fh-label">2026년 누적</div>
        <div class="fh-value">${fmt(y2026)}</div>
      </div>
      <div class="forecast-hero-card">
        <div class="fh-label">${FORECAST_YEARS[FORECAST_YEARS.length - 1]}년 누적</div>
        <div class="fh-value">${fmt(yLast)}</div>
      </div>
      <div class="forecast-hero-card">
        <div class="fh-label">월 투자 합계 (2인)</div>
        <div class="fh-value">${fmt(calcYearBreakdown(2027).total / 12)}</div>
      </div>
    </div>
    <div class="forecast-legend">${legend}</div>
    <div class="fc-chart">${chartRows}</div>
    <div class="forecast-table-wrap">
      <table class="forecast-table">
        <thead>${tableHead}</thead>
        <tbody>
          ${catRows}
          <tr class="total-row"><td>연간 적립 합계</td>${annualCells}<td>${fmt(yLast)}</td></tr>
          <tr class="cum-row"><td>누적 합계</td>${cumCells}<td>${fmt(yLast)}</td></tr>
        </tbody>
      </table>
    </div>
    <p class="forecast-note">
      · 2026년 ISA에 영재 목돈 2,000만원(7월 일시) 포함 · 이후 연도는 월 납입만 반영<br>
      · 수익률·환율 미반영 순 납입액 기준 · 실제 체크리스트 실적과 별도
    </p>`;
}

// 메인 탭 (계획 / 체크리스트)
document.getElementById('main-nav').addEventListener('click', e => {
  const btn = e.target.closest('.main-nav-btn');
  if (!btn) return;
  const page = btn.dataset.page;
  document.querySelectorAll('.main-nav-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.main-page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
});

// 렌더
const yjExp = sum(YJ.items) + (YJ.isa?.monthly ? sum(YJ.isa.rows) : 0);
const snExp = sum(SN.items) + (SN.isa?.monthly ? sum(SN.isa.rows) : 0);

document.getElementById('grid-both').innerHTML = renderPersonCard(YJ) + renderPersonCard(SN);

renderDashboard(yjExp, snExp);
renderISA();
renderWilliam();
renderLivingBudget();
renderForecast();

const store = await initStore((remote) => {
  budgetChecks = remote;
  renderTracker();
});
storeMode = store.mode;
renderTracker();
</script>
